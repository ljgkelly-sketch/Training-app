// ── Pace helpers ──────────────────────────────────────────────────────────────
function calcPaceStr(distStr, durMins, unit) {
  const dist = parseFloat(distStr), mins = parseFloat(durMins);
  if (!dist || !mins || dist <= 0 || mins <= 0) return "";
  const p = mins / dist;
  const m = Math.floor(p), s = Math.round((p - m) * 60);
  return m + ":" + s.toString().padStart(2,"0") + " / " + (unit==="mi"?"mi":"km");
}
function calcSpeedStr(distStr, durMins, unit) {
  const dist = parseFloat(distStr), mins = parseFloat(durMins);
  if (!dist || !mins || dist <= 0 || mins <= 0) return "";
  return (dist / (mins / 60)).toFixed(1) + " " + (unit==="mi"?"mph":"km/h");
}

function searchCoreFoods(query){
  const q=query.trim().toLowerCase();
  if(!q)return[];
  return CORE_FOODS.filter(f=>f.name.toLowerCase().includes(q)).map(f=>({...f,generic:true}));
}

function dateKey(d=new Date()){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseDateKey(k){const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d);}
function fmtDate(iso){return parseDateKey(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function fmtDuration(sec){
  sec=parseFloat(sec);
  if(!sec&&sec!==0)return"";
  if(sec>=60)return`${Math.floor(sec/60)}:${String(Math.round(sec%60)).padStart(2,"0")}`;
  return`${Math.round(sec)}s`;
}
function handleEnterNav(e){
  if(e.key!=="Enter")return;
  e.preventDefault();
  const all=Array.from(document.querySelectorAll("[data-order]")).sort((a,b)=>Number(a.dataset.order)-Number(b.dataset.order));
  const idx=all.indexOf(e.target);
  if(idx>=0&&idx<all.length-1)all[idx+1].focus();
  else e.target.blur();
}
function uid(){return Math.random().toString(36).slice(2,9);}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── Week / period helpers (all local-time based — no UTC conversion, no off-by-one) ──
function addDays(dateKeyStr,n){const d=parseDateKey(dateKeyStr);d.setDate(d.getDate()+n);return dateKey(d);}
function getWeekStart(d=new Date()){
  const dt=new Date(d);const day=dt.getDay();const diff=day===0?-6:1-day; // Monday as start of week
  dt.setDate(dt.getDate()+diff);
  return dateKey(dt);
}
function getISOWeekNumber(dateKeyStr){
  const d=parseDateKey(dateKeyStr);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const week1=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-week1)/86400000-3+((week1.getDay()+6)%7))/7);
}
function fmtWeekRange(weekStart){
  const end=addDays(weekStart,6);
  const s=parseDateKey(weekStart),e=parseDateKey(end);
  const sameMonth=s.getMonth()===e.getMonth();
  const sFmt=s.toLocaleDateString("en-GB",{day:"numeric",month:sameMonth?undefined:"short"});
  const eFmt=e.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  return `${sFmt}–${eFmt}`;
}
function periodRange(period){
  const today=dateKey();
  const days={week:7,month:30,quarter:90,half:182,year:365}[period]||30;
  return {start:addDays(today,-days+1),end:today};
}
function inRange(d,start,end){return d>=start&&d<=end;}
function getMonthGridDays(year,month){
  const first=new Date(year,month,1);
  const firstDay=first.getDay();
  const diff=firstDay===0?-6:1-firstDay;
  const gridStart=new Date(year,month,1+diff);
  return Array.from({length:42}).map((_,i)=>{
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);
    return dateKey(d);
  });
}

async function searchFoods(query){
  const local=searchCoreFoods(query);
  let remote=[];
  try{
    const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=12&sort_by=unique_scans_n&fields=product_name,brands,nutriments,serving_size`);
    const d=await r.json();
    remote=(d.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>{
      const n=p.nutriments;
      return{name:p.product_name+(p.brands?` (${p.brands.split(",")[0].trim()})`:``),
        protein100:parseFloat(n["proteins_100g"]||0),
        calories100:parseFloat(n["energy-kcal_100g"]||(n["energy_100g"]?n["energy_100g"]/4.184:0)),
        serving:parseFloat(p.serving_size)||100,generic:false};
    }).filter(p=>p.calories100>0||p.protein100>0);
  }catch{ /* offline or blocked — local results still work */ }
  // Local common-food matches first (most reliable for fresh produce/drinks), then branded results
  return[...local,...remote];
}

    setWL(next);lsSet("wlogs",next);
  }
  function deleteWorkout(dayId,date){
    const k=`${dayId}__${date}`;
    const next={...wlogs};delete next[k];
    setWL(next);lsSet("wlogs",next);
  }
  function saveFood(date,meals){const next={...flogs,[date]:meals};setFL(next);lsSet("flogs",next);}
  function saveBW(date,weight){const next={...bwlogs,[date]:weight};setBW(next);lsSet("bwlogs",next);}
  function deleteBW(date){const next={...bwlogs};delete next[date];setBW(next);lsSet("bwlogs",next);}
  function saveProteinTarget(v){setProteinTarget(v);lsSet("proteinTarget",v);}
  function saveCalorieTarget(v){setCalorieTarget(v);lsSet("calorieTarget",v);}

  function removeFavourite(favId){const next=favourites.filter(f=>f.favId!==favId);setFavourites(next);lsSet("favourites",next);}

function MonthCalendar({weekStart,onSelectDate,onClose}){
  const wsDate=parseDateKey(weekStart);
  const [viewYear,setViewYear]=useState(wsDate.getFullYear());
  const [viewMonth,setViewMonth]=useState(wsDate.getMonth());
  const weekEnd=addDays(weekStart,6);
  const today=dateKey();
  const days=getMonthGridDays(viewYear,viewMonth);
  const monthLabel=new Date(viewYear,viewMonth,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});

  function prevMonth(){const m=viewMonth-1;if(m<0){setViewMonth(11);setViewYear(viewYear-1);}else setViewMonth(m);}
  function nextMonth(){const m=viewMonth+1;if(m>11){setViewMonth(0);setViewYear(viewYear+1);}else setViewMonth(m);}

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div className="su" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"18px 18px 28px",width:"100%",maxWidth:480,margin:"0 auto"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prevMonth} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.mid,fontSize:18,padding:"6px 14px",cursor:"pointer"}}>‹</button>
          <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:17,fontWeight:700,color:C.ink}}>{monthLabel}</div>
          <button onClick={nextMonth} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.mid,fontSize:18,padding:"6px 14px",cursor:"pointer"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,color:C.dim,fontWeight:600,padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {days.map(d=>{
            const inMonth=parseDateKey(d).getMonth()===viewMonth;
            const isToday=d===today;
            const inSelectedWeek=inRange(d,weekStart,weekEnd);
            return(
              <button key={d} onClick={()=>onSelectDate(d)}
                style={{
                  aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",
                  borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:isToday?700:500,
                  background:inSelectedWeek?C.accent:"none",
                  color:!inMonth?C.muted:(inSelectedWeek?C.ink:(isToday?C.blue:C.text)),
                  border:isToday&&!inSelectedWeek?`1px solid ${C.blue}`:"1px solid transparent",
                }}>
                {parseDateKey(d).getDate()}
              </button>
            );
          })}
        </div>
        <div style={{marginTop:16}}><BackBar onHome={onClose} label="Close"/></div>
      </div>
    </div>
  );
}

      Object.entries(sData).forEach(([exId,val])=>{
        const ex=prog[dayIdx].exercises.find(e=>e.id===exId);
        toSave[exId]={...val,name:ex?ex.name:val.name,logType:ex?(ex.logType||"weight"):(val.logType||"weight")};
      });
    }
    // If we're editing an existing session and the date's been changed, this is a
    // move, not a duplicate — remove the old dated entry so it doesn't linger.
    if(editingOriginalDate&&editingOriginalDate!==sDate){
      deleteWorkout(prog[dayIdx].id,editingOriginalDate);
    }
    saveWorkout(prog[dayIdx].id,sDate,{sets:toSave,note},{dayName:prog[dayIdx].name,dayType:prog[dayIdx].type,dayTag:prog[dayIdx].tag,dayTemplate:prog[dayIdx].template});
    setEditingOriginalDate(sDate);
    setSaved(true);
  }
  function deleteDay(i){
    const next=prog.filter((_,idx)=>idx!==i);
    saveProg(next);
    setView("home");
  }
  function addDay(newDay){
    const dayWithWeek={...newDay,weekAdded:weekStart};
    const newIndex=prog.length;
    saveProg([...prog,dayWithWeek]);
    setShowAddDay(false);
    setDayIdx(newIndex);
    if(newDay.type===TYPE_CARDIO){
      setSData({});setNote("");setSaved(false);setEditingOriginalDate(null);
      const isCurrentWeek=weekStart===getWeekStart();
      setSDate(isCurrentWeek?dateKey():weekStart);
      setView("session");
    }else{
      setEditReturn("home");
      setView("edit");
    }
  }
  function addDayFromFavourite(fav){
    const tag=`DAY ${prog.length+1}`;
    const newDay=fav.type===TYPE_GYM
      ?{id:uid(),tag,name:fav.name,type:TYPE_GYM,exercises:fav.exercises.map(e=>({...e,id:uid()})),weekAdded:weekStart,scoped:true}
      :{id:uid(),tag,name:fav.name,type:TYPE_CARDIO,template:fav.template,fields:fav.fields,weekAdded:weekStart,scoped:true};
    saveProg([...prog,newDay]);
    setShowAddDay(false);
  }

  const day=prog[dayIdx];

  useEffect(()=>{
    // Safety net: if the referenced day no longer exists (shouldn't normally happen), don't crash — go home.
    if(!day&&view!=="home")setView("home");
  },[day,view]);

  if(!day&&view!=="home")return null;

  if(view==="edit") return <EditDay day={day} dayIdx={dayIdx} prog={prog} saveProg={saveProg} onBack={()=>setView(editReturn)} onDelete={deleteDay} favourites={favourites} addFavourite={addFavourite} removeFavourite={removeFavourite} exerciseLibrary={exerciseLibrary} addToExerciseLibrary={addToExerciseLibrary}/>;

  if(view==="detail"&&viewLog){
    const isCardio=day.type===TYPE_CARDIO;
    const tmpl=isCardio?(CARDIO_TEMPLATES.find(t=>t.name===day.template)||CARDIO_TEMPLATES[6]):null;
    const exEntries=isCardio?[]:Object.entries(viewLog.data?.sets||{}).filter(([,d])=>d?.sets);
    return(
      <div className="fu">
        <div style={{padding:"16px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <BackBar onHome={()=>setView("home")}/>
            <button onClick={()=>editSession(viewLog)} style={{display:"flex",alignItems:"center",gap:5,background:C.accent,border:"none",borderRadius:20,color:C.ink,fontSize:13,fontWeight:700,padding:"10px 16px",cursor:"pointer"}}>
              ✎ Edit
            </button>
          </div>
          <div style={{fontSize:12,color:isCardio?C.blue:C.accent,letterSpacing:"0.1em",fontWeight:600}}>{day.tag} · {isCardio?"CARDIO":"GYM"}</div>
          <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:24,lineHeight:1.1,marginTop:2,color:C.ink}}>{day.name}</div>
          <div style={{fontSize:13,color:C.dim,marginTop:4}}>{fmtDate(viewLog.date)}</div>
        </div>

        <div style={{padding:"16px 18px"}}>
          {isCardio?(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(tmpl?.fields||[]).map(f=>{
                const v=viewLog.data?.sets?.[f.id];
                if(!v)return null;
                return(
                  <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"11px 14px"}}>
                    <span style={{fontSize:13,color:C.dim}}>{f.label}</span>
                    <span style={{fontSize:15,color:C.ink,fontWeight:600}}>{v}</span>
                  </div>
                );
              })}
              {!tmpl?.fields?.some(f=>viewLog.data?.sets?.[f.id])&&(
                <div style={{fontSize:14,color:C.muted}}>No details recorded for this session</div>
              )}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {exEntries.length===0&&<div style={{fontSize:14,color:C.muted}}>No sets recorded for this session</div>}
              {exEntries.map(([exId,d])=>{
                const logType=d.logType||"weight";
                const setLabels=d.sets.map(s=>{
                  if(logType==="weight")return s.w?`${s.w}kg${s.r?` × ${s.r}`:""}`:null;
                  if(logType==="bodyweight")return s.r?`${s.r} reps`:null;
                  return s.dur?fmtDuration(s.dur):null;
                }).filter(Boolean);
                return(
                  <div key={exId} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"12px 14px"}}>
                    <div style={{fontSize:15,color:C.ink,fontWeight:600,marginBottom:setLabels.length?7:0}}>{d.name||"Exercise"}</div>
                    {setLabels.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {setLabels.map((s,si)=>(
                          <span key={si} style={{fontSize:13,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 9px",color:C.mid}}>{s}</span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {viewLog.data?.note&&(
            <div style={{marginTop:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"11px 14px"}}>
              <div style={{fontSize:11,color:C.dim,letterSpacing:"0.08em",marginBottom:4,fontWeight:600}}>NOTES</div>
              <div style={{fontSize:14,color:C.text}}>{viewLog.data.note}</div>
            </div>
          )}
          <button onClick={startNewSession} style={{width:"100%",marginTop:18,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:13,fontWeight:600,padding:11,cursor:"pointer"}}>
            + Log a new session for {day.name}
          </button>
          <div style={{height:24}}/>
        </div>
      </div>
    );
  }

  if(view==="session"){
    const isCardio=day.type===TYPE_CARDIO;
    const prev=Object.values(wlogs).filter(l=>l.dayId===day.id&&l.date!==sDate).sort((a,b)=>b.date.localeCompare(a.date))[0];
    let orderCounter=0;
    const getOrder=()=>orderCounter++;
    return(
      <div className="fu">
        <div style={{padding:"16px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <BackBar onHome={()=>setView("home")}/>
            <button onClick={openEditFromSession} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:`1px solid ${C.border}`,borderRadius:20,color:C.mid,fontSize:13,fontWeight:600,padding:"9px 14px",cursor:"pointer"}}>
              ✎ Edit
            </button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:isCardio?C.blue:C.accent,letterSpacing:"0.1em",fontWeight:600}}>{day.tag} · {isCardio?`CARDIO · ${unit.toUpperCase()}`:"GYM"}</div>
              <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:24,lineHeight:1.1,marginTop:2,color:C.ink}}>{day.name}</div>
            </div>
            <input type="date" value={sDate} onChange={e=>{setSDate(e.target.value);setSaved(false);}}
              style={{background:C.card,border:`1px solid ${C.border}`,color:C.mid,fontSize:13,borderRadius:6,padding:"6px 8px"}}/>
          </div>
        </div>

        {/* Previous session summary */}
        {prev&&(
          <div style={{margin:"10px 18px 0",background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"8px 12px"}}>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:4}}>LAST — {fmtDate(prev.date)}</div>
            {isCardio?(
              <div style={{fontSize:13,color:C.mid}}>{prev.data?.note||"No notes recorded"}</div>
            ):(
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {day.exercises.map(ex=>{
                  const d=prev.data?.sets?.[ex.id];if(!d?.sets)return null;
                  const logType=d.logType||ex.logType||"weight";
                  const key=logType==="weight"?"w":logType==="bodyweight"?"r":"dur";
                  const vals=d.sets.map(s=>parseFloat(s[key])).filter(Boolean);
                  if(!vals.length)return null;
                  const best=Math.max(...vals);
                  const label=logType==="weight"?`${best}kg`:logType==="bodyweight"?`${best} reps`:fmtDuration(best);
                  return <div key={ex.id} style={{fontSize:12,background:C.surface,borderRadius:4,padding:"2px 7px",color:C.mid}}>{ex.name.split(" ")[0]} {label}</div>;
                })}
              </div>
            )}
          </div>
        )}

        <div style={{padding:"0 18px"}}>
          {isCardio?(
            <CardioLogger day={day} sData={sData} setSData={setSData} unit={unit} toggleUnit={toggleUnit} getOrder={getOrder}/>
          ):(
            day.exercises.map(ex=>(
              <ExLogger key={ex.id} ex={ex} data={sData[ex.id]} prev={prev?.data?.sets?.[ex.id]} setSet={(si,f,v)=>setSet(ex.id,si,f,v)} showRPE={showRPE} getOrder={getOrder}/>
            ))
          )}
          <div style={{marginTop:14}}>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:6,fontWeight:600}}>NOTES</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="How did it feel? Any PBs?"
              style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:5,color:C.text,fontSize:14,padding:"10px 12px",resize:"none",outline:"none"}}/>
          </div>
          <button onClick={doSave} style={{width:"100%",marginTop:10,marginBottom:24,padding:14,background:saved?"#e6efdf":C.accent,color:saved?C.green:C.ink,border:"none",borderRadius:5,fontSize:14,fontWeight:600,letterSpacing:"0.06em",cursor:"pointer",transition:"all 0.2s"}}>
            {saved?"✓ SAVED":"SAVE SESSION"}
          </button>
          <BackBar onHome={()=>setView("home")} label="Back to Home"/>
          <div style={{height:24}}/>
        </div>
      </div>
    );
  }

  // Home
  const thisWeekStart=getWeekStart();
  const thisWeekEnd=addDays(thisWeekStart,6);
  const doneThisWeek=prog.filter(d=>Object.values(wlogs).some(l=>l.dayId===d.id&&inRange(l.date,thisWeekStart,thisWeekEnd))).length;
  const totalDays=prog.length;
  const weekPct=totalDays?Math.min(100,(doneThisWeek/totalDays)*100):0;
  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.15em"}}>PROGRAMME</div>
            <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:36,letterSpacing:"0.01em",fontWeight:700,color:C.ink,lineHeight:1}}>Training</div>
            <div style={{fontSize:13,color:C.dim,marginTop:4}}>{Object.keys(wlogs).length} sessions logged</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
            <button onClick={toggleShowRPE} style={{background:showRPE?"#f7e6d2":C.card,border:`1px solid ${showRPE?C.accent:C.border}`,borderRadius:5,color:showRPE?C.accent:C.dim,fontSize:12,fontWeight:600,padding:"6px 12px",cursor:"pointer",letterSpacing:"0.06em"}}>
              RPE: {showRPE?"ON":"OFF"}
            </button>
          </div>
        </div>
        {totalDays>0&&(
          <div style={{marginTop:16,background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7}}>
              <span style={{fontSize:13,color:C.mid,fontWeight:600}}>This week</span>
              <span style={{fontSize:13,color:doneThisWeek>=totalDays?C.accent:C.dim,fontWeight:700}}>{doneThisWeek}/{totalDays} sessions</span>
            </div>
            <div style={{background:C.muted,borderRadius:6,height:8,overflow:"hidden"}}>
              <div style={{width:`${weekPct}%`,height:"100%",background:doneThisWeek>=totalDays?C.accent:C.blue,borderRadius:6,transition:"width 0.3s"}}/>
            </div>
          </div>
        )}
      </div>

      <div style={{padding:"16px 18px 0"}}>
        <WeekNav weekStart={weekStart} onChange={setWeekStart}/>
      </div>

      <div style={{padding:"0 18px",display:"flex",flexDirection:"column",gap:8}}>
        {(()=>{
          const isCurrentWeek=weekStart===getWeekStart();
          const weekEnd=addDays(weekStart,6);
          const rows=prog.map((d,i)=>{
            const isCardio=d.type===TYPE_CARDIO;
            const sessions=Object.values(wlogs).filter(l=>l.dayId===d.id);
            const last=sessions.sort((a,b)=>b.date.localeCompare(a.date))[0];
            const weekSessions=sessions.filter(l=>inRange(l.date,weekStart,weekEnd));
            const weekLast=weekSessions.sort((a,b)=>b.date.localeCompare(a.date))[0];
            return{d,i,isCardio,last,weekLast,tagColor:isCardio?C.blue:C.accent,matched:true};
          });

          // A day shows in a given week if it's a permanent/recurring programme day
          // (not scoped), OR it was specifically added for this week, OR it actually
          // has a session logged this week. Favourite-added one-off sessions are
          // 'scoped', so they only appear in the week they were meant for.
          const visible=rows.filter(r=>!r.d.scoped||r.d.weekAdded===weekStart||r.weekLast);

          // Surface sessions logged this week against a day that no longer exists
          // (e.g. it was since deleted) — Stats never loses these, so the weekly view shouldn't either.
          const progIds=new Set(prog.map(d=>d.id));
          const weekLogs=Object.values(wlogs).filter(l=>inRange(l.date,weekStart,weekEnd)&&!progIds.has(l.dayId));
          const byDayId={};
          weekLogs.forEach(l=>{if(!byDayId[l.dayId]||l.date>byDayId[l.dayId].date)byDayId[l.dayId]=l;});
          const orphans=Object.values(byDayId).map(log=>{
            const vals=Object.values(log.data?.sets||{});
            const isCardio=log.dayType?log.dayType===TYPE_CARDIO:!vals.some(v=>v&&typeof v==="object"&&Array.isArray(v.sets));
            const name=log.dayName||(isCardio?"Cardio session":"Workout")+" (deleted)";
            return{log,isCardio,name,tagColor:isCardio?C.blue:C.accent};
          });

          if(visible.length===0&&orphans.length===0){
            return(
              <div style={{padding:"20px 4px",textAlign:"center",color:C.muted,fontSize:14}}>
                Nothing logged this week
              </div>
            );
          }
          return[
            ...visible.map(({d,i,isCardio,last,weekLast,tagColor})=>{
            const copyKey=d.id+(weekLast?.date||"");
            return(
              <div key={d.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"0 6px 6px 0",overflow:"hidden",borderLeft:`4px solid ${tagColor}`}}>
                <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>openDay(i,weekLast)}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <span style={{fontSize:12,color:tagColor,letterSpacing:"0.15em"}}>{d.tag}</span>
                      <span style={{fontSize:11,color:isCardio?C.blue:C.accent,background:isCardio?"#e8effe":"#f7e6d2",padding:"2px 7px",borderRadius:4,letterSpacing:"0.08em",fontWeight:600}}>{isCardio?"CARDIO":"GYM"}</span>
                    </div>
                    <div style={{fontSize:17,color:C.ink,fontWeight:600}}>{d.name}</div>
                    <div style={{fontSize:13,marginTop:2,color:weekLast?C.green:C.dim}}>
                      {weekLast?`✓ Logged ${fmtDate(weekLast.date)}`:"Not logged this week"}
                      {!isCardio&&` · ${d.exercises.length} exercises`}
                    </div>
                    {!weekLast&&last&&isCurrentWeek&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>Last done: {fmtDate(last.date)}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick={()=>openEdit(i)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontSize:13,padding:"5px 9px",cursor:"pointer",fontWeight:600}}>EDIT</button>
                    <button onClick={()=>setConfirmDeleteId(d.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.red,fontSize:16,padding:"5px 8px",cursor:"pointer",lineHeight:1}}>🗑</button>
                    <span onClick={()=>openDay(i,weekLast)} style={{color:C.muted,fontSize:24,cursor:"pointer"}}>›</span>
                  </div>
                </div>
                {confirmDeleteId===d.id&&(
                  <div style={{margin:"0 14px 12px",background:"#f7e3df",border:`1px solid ${C.red}44`,borderRadius:5,padding:"10px 12px"}}>
                    <div style={{fontSize:13,color:C.mid,marginBottom:8}}>Delete "{d.name}"? Logged sessions for it are kept in Stats.</div>
                    <div style={{display:"flex",gap:7}}>
                      <button onClick={()=>setConfirmDeleteId(null)} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontSize:13,padding:"7px",cursor:"pointer"}}>Cancel</button>
                      <button onClick={()=>{deleteDay(i);setConfirmDeleteId(null);}} style={{flex:1,background:C.red,border:"none",borderRadius:6,color:C.white,fontSize:13,fontWeight:600,padding:"7px",cursor:"pointer"}}>Delete</button>
                    </div>
                  </div>
                )}
                {weekLast&&(
                  <div style={{padding:"0 14px 12px"}}>
                    <button onClick={()=>copyToNextWeek(d,weekLast)}
                      style={{background:copiedKey===copyKey?"#f7e6d2":"none",border:`1px solid ${copiedKey===copyKey?C.accent:C.border}`,borderRadius:6,color:copiedKey===copyKey?C.accent:C.dim,fontSize:12,padding:"6px 11px",cursor:"pointer",fontWeight:600}}>
                      {copiedKey===copyKey?`✓ Copied to ${fmtDate(addDays(weekLast.date,7))}`:"⧉ Copy to next week"}
                    </button>
                  </div>
                )}
              </div>
            );
            }),
            ...orphans.map(({log,isCardio,name,tagColor})=>(
              <div key={"orphan-"+log.dayId} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"0 6px 6px 0",overflow:"hidden",borderLeft:`4px solid ${tagColor}`,opacity:0.85}}>
                <div style={{padding:"13px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                    <span style={{fontSize:11,color:isCardio?C.blue:C.accent,background:isCardio?"#e8effe":"#f7e6d2",padding:"2px 7px",borderRadius:4,letterSpacing:"0.08em",fontWeight:600}}>{isCardio?"CARDIO":"GYM"}</span>
                  </div>
                  <div style={{fontSize:17,color:C.ink,fontWeight:600}}>{name}</div>
                  <div style={{fontSize:13,marginTop:2,color:C.green}}>✓ Logged {fmtDate(log.date)}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:3}}>No longer in your programme — full details in Stats</div>
                </div>
              </div>
            )),
          ];
        })()}

        {/* Add day button */}
        <button onClick={()=>setShowAddDay(true)}
          style={{padding:"13px",background:"none",border:`1px dashed ${C.border}`,borderRadius:6,color:C.dim,fontSize:14,cursor:"pointer",letterSpacing:"0.08em",marginTop:2}}>
          + ADD DAY
        </button>
      </div>

      {showAddDay&&<AddDayModal onAdd={addDay} onClose={()=>setShowAddDay(false)} dayCount={prog.length} favourites={favourites} onAddFavourite={addDayFromFavourite} removeFavourite={removeFavourite}/>}
    </div>
  );
}

// ── ADD DAY MODAL ─────────────────────────────────────────────────────────────
function AddDayModal({onAdd,onClose,dayCount,favourites,onAddFavourite,removeFavourite}){
  const [mode,setMode]=useState("new");
  const [type,setType]=useState(TYPE_GYM);
  const [name,setName]=useState("");
  const [cardioTemplate,setCardioTemplate]=useState(0);

  function confirm(){
    if(!name.trim())return;
    const tag=`DAY ${dayCount+1}`;
    if(type===TYPE_GYM){
      onAdd({id:uid(),tag,name:name.trim(),type:TYPE_GYM,exercises:[]});
    } else {
      const tmpl=CARDIO_TEMPLATES[cardioTemplate];
      onAdd({id:uid(),tag,name:name.trim(),type:TYPE_CARDIO,template:tmpl.name,fields:tmpl.fields});
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div className="su" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"20px 18px 40px",width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"85vh",overflowY:"auto"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.15em",marginBottom:14}}>ADD NEW DAY</div>

        {favourites.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[["new","Create New"],["fav",`★ Favourites (${favourites.length})`]].map(([id,label])=>(
              <button key={id} onClick={()=>setMode(id)}
                style={{padding:"11px",background:mode===id?"#f7ecd2":C.card,border:`1px solid ${mode===id?C.warn:C.border}`,borderRadius:5,color:mode===id?C.warn:C.dim,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {label}
              </button>
            ))}
          </div>
        )}

        {mode==="fav"?(
          <div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {favourites.map(f=>(
                <div key={f.favId} style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"11px 12px"}}>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>onAddFavourite(f)}>
                    <div style={{fontSize:15,color:C.ink,fontWeight:600}}>{f.name}</div>
                    <div style={{fontSize:12,color:C.dim,marginTop:1}}>
                      {f.type===TYPE_CARDIO?`Cardio · ${f.template}`:`Gym · ${f.exercises.length} exercises`}
                    </div>
                  </div>

            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {CARDIO_TEMPLATES.map((t,i)=>(
                <button key={i} onClick={()=>setCardioTemplate(i)}
                  style={{background:cardioTemplate===i?C.blue:C.card,color:cardioTemplate===i?C.white:C.dim,border:`1px solid ${cardioTemplate===i?C.blue:C.border}`,borderRadius:6,fontSize:13,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                  {t.name}
                </button>
              ))}
            </div>
            <div style={{marginTop:10,fontSize:13,color:C.dim,background:C.card,borderRadius:5,padding:"8px 10px"}}>
              Fields: {CARDIO_TEMPLATES[cardioTemplate].fields.map(f=>f.label).join(", ")}

        )}

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:14,padding:12,cursor:"pointer"}}>CANCEL</button>
          <button onClick={confirm} style={{flex:2,background:type===TYPE_CARDIO?C.blue:C.accent,border:"none",borderRadius:5,color:type===TYPE_CARDIO?C.white:C.ink,fontSize:14,fontWeight:500,padding:12,cursor:"pointer",letterSpacing:"0.08em"}}>
            ADD DAY

        </>
        )}
      </div>
    </div>
  );
}

// ── CARDIO LOGGER ─────────────────────────────────────────────────────────────
function CardioLogger({day,sData,setSData,unit,toggleUnit,getOrder}){
  const tmpl=CARDIO_TEMPLATES.find(t=>t.name===day.template)||CARDIO_TEMPLATES[6];
  const fields=day.fields||tmpl.fields;
  const hasPaceCalc=tmpl.calcPace;

  function upd(id,v){setSData(p=>({...p,[id]:v}));}

  const distance=sData["distance"]||"";
  const duration=sData["duration"]||"";
  const autoPace=hasPaceCalc?calcPaceStr(distance,duration,unit):"";
  const autoSpeed=hasPaceCalc?calcSpeedStr(distance,duration,unit):"";
  const distUnit=unit==="mi"?"miles":"km";

  return(
    <div style={{paddingTop:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:12,color:C.blue,letterSpacing:"0.12em"}}>{day.template||"CARDIO SESSION"}</div>
        <button onClick={toggleUnit} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,color:C.blue,fontSize:11,fontWeight:600,padding:"5px 10px",cursor:"pointer",letterSpacing:"0.06em"}}>
          {unit==="km"?"KM  →  MI":"MI  →  KM"}
        </button>
      </div>
      {fields.map(f=>{
        const isReadonlyPace=f.id==="pace"&&hasPaceCalc;
        const displayVal=isReadonlyPace?autoPace:(sData[f.id]||"");
        const lbl=f.id==="distance"?`Distance (${distUnit})`:f.label;
        return(
          <div key={f.id} style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>{lbl.toUpperCase()}</div>
            <input
              value={displayVal}
              onChange={isReadonlyPace?undefined:e=>upd(f.id,e.target.value)}
              readOnly={isReadonlyPace}
              data-order={!isReadonlyPace&&getOrder?getOrder():undefined} onKeyDown={isReadonlyPace?undefined:handleEnterNav} enterKeyHint="next"
              placeholder={isReadonlyPace?(distance&&duration?"Calculating...":f.placeholder):f.placeholder}
              style={{width:"100%",background:isReadonlyPace?C.surface:C.card,
                border:`1px solid ${isReadonlyPace?(autoPace?C.accent+"55":C.border):(sData[f.id]?C.blue+"66":C.border)}`,
                borderRadius:5,color:isReadonlyPace?(autoPace?C.accent:C.dim):C.text,
                fontSize:16,padding:"10px 12px",outline:"none",transition:"border-color 0.15s",
                cursor:isReadonlyPace?"default":"text"}}/>
          </div>
        );
      })}
      {hasPaceCalc&&autoPace&&(
        <div style={{background:"#f7e6d2",border:`1px solid ${C.accent}33`,borderRadius:5,padding:"10px 14px",marginTop:4}}>
          <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:6}}>CALCULATED</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:28,color:C.accent,lineHeight:1}}>{autoPace}</div>
              <div style={{fontSize:12,color:C.dim,marginTop:2}}>avg pace</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:28,color:C.green,lineHeight:1}}>{autoSpeed}</div>
              <div style={{fontSize:12,color:C.dim,marginTop:2}}>avg speed</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── EDIT DAY ──────────────────────────────────────────────────────────────────
function ExerciseAutocomplete({value,onChange,library,onAddToLibrary,placeholder}){
  const [open,setOpen]=useState(false);
  const trimmed=value.trim();
  const matches=(trimmed?library.filter(n=>n.toLowerCase().includes(trimmed.toLowerCase())):library).slice(0,6);
  const exactMatch=library.some(n=>n.toLowerCase()===trimmed.toLowerCase());

  function select(name){onChange(name);onAddToLibrary(name);setOpen(false);}

  return(
    <div style={{position:"relative"}}>
      <input type="text" value={value}
        onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>{setOpen(false);if(trimmed)onAddToLibrary(trimmed);}}
        placeholder={placeholder||"Exercise name"}
        style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:15,padding:"8px 10px",outline:"none",width:"100%"}}/>
      {open&&(matches.length>0||(trimmed&&!exactMatch))&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:30,background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,marginTop:4,maxHeight:190,overflowY:"auto",boxShadow:"0 6px 16px rgba(20,22,31,0.12)"}}>
          {matches.map(m=>(
            <div key={m} onMouseDown={e=>{e.preventDefault();select(m);}}
              style={{padding:"9px 12px",fontSize:14,color:C.text,cursor:"pointer",borderBottom:`1px solid ${C.border}`}}>
              {m}
            </div>
          ))}
          {trimmed&&!exactMatch&&(
            <div onMouseDown={e=>{e.preventDefault();select(trimmed);}}
              style={{padding:"9px 12px",fontSize:13,color:C.accent,fontWeight:600,cursor:"pointer"}}>
              + Add "{trimmed}" as new exercise
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function EditDay({day,dayIdx,prog,saveProg,onBack,onDelete,favourites,addFavourite,removeFavourite,exerciseLibrary,addToExerciseLibrary}){
  const [draft,setDraft]=useState(JSON.parse(JSON.stringify(day)));
  const [newEx,setNewEx]=useState({name:"",sets:3,reps:"",note:"",logType:"weight"});
  const [addOpen,setAddOpen]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(false);
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);
  const rowRefs=useRef([]);
  const isCardio=draft.type===TYPE_CARDIO;
  const existingFav=favourites.find(f=>f.sourceId===day.id);

  function upd(f,v){setDraft(p=>({...p,[f]:v}));}
  function updEx(i,f,v){const e=[...draft.exercises];e[i]={...e[i],[f]:v};setDraft(p=>({...p,exercises:e}));}
  function commitSets(i,v){const n=Math.max(1,parseInt(v)||1);const e=[...draft.exercises];e[i]={...e[i],sets:n};setDraft(p=>({...p,exercises:e}));}
  function removeEx(i){setDraft(p=>({...p,exercises:p.exercises.filter((_,idx)=>idx!==i)}));}
  function moveEx(i,dir){const e=[...draft.exercises];const t=i+dir;if(t<0||t>=e.length)return;[e[i],e[t]]=[e[t],e[i]];setDraft(p=>({...p,exercises:e}));}
  function startDrag(i,e){e.preventDefault();setDragIdx(i);setOverIdx(i);}
  useEffect(()=>{
    if(dragIdx==null)return;
    function onMove(e){
      const y=(e.touches?e.touches[0].clientY:e.clientY);
      let closest=null,closestDist=Infinity;
      rowRefs.current.forEach((el,idx)=>{
        if(!el)return;
        const rect=el.getBoundingClientRect();
        const mid=rect.top+rect.height/2;
        const dist=Math.abs(y-mid);
        if(dist<closestDist){closestDist=dist;closest=idx;}
      });
      if(closest!=null)setOverIdx(closest);
    }
    function onUp(){
      setDraft(p=>{
        if(overIdx==null||overIdx===dragIdx)return p;
        const arr=[...p.exercises];
        const [moved]=arr.splice(dragIdx,1);
        arr.splice(overIdx,0,moved);
        return{...p,exercises:arr};
      });
      setDragIdx(null);setOverIdx(null);
    }
    window.addEventListener("pointermove",onMove);
    window.addEventListener("pointerup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("touchend",onUp);
    return()=>{
      window.removeEventListener("pointermove",onMove);
      window.removeEventListener("pointerup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
  },[dragIdx,overIdx]);
  function addEx(){
    if(!newEx.name.trim())return;
    const name=newEx.name.trim();
    const e=[...draft.exercises,{id:uid(),name,sets:Math.max(1,parseInt(newEx.sets)||3),reps:newEx.reps||"10",note:newEx.note,logType:newEx.logType||"weight"}];
    setDraft(p=>({...p,exercises:e}));setNewEx({name:"",sets:3,reps:"",note:"",logType:"weight"});setAddOpen(false);
    addToExerciseLibrary(name);
  }
  function changeTemplate(i){
    const tmpl=CARDIO_TEMPLATES[i];
    setDraft(p=>({...p,template:tmpl.name,fields:tmpl.fields}));
  }
  function save(){const next=[...prog];next[dayIdx]=draft;saveProg(next);onBack();}
  function resetAll(){saveProg(DEFAULT_PROGRAMME);onBack();}
  function toggleFavourite(){
    if(existingFav){removeFavourite(existingFav.favId);return;}
    const fav=draft.type===TYPE_GYM
      ?{favId:uid(),sourceId:day.id,name:draft.name,type:TYPE_GYM,exercises:draft.exercises.map(e=>({...e}))}
      :{favId:uid(),sourceId:day.id,name:draft.name,type:TYPE_CARDIO,template:draft.template,fields:draft.fields};
    addFavourite(fav);
  }

  const inp=(val,onChange,placeholder,type="text",extra={})=>(
    <input type={type} value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:15,padding:"8px 10px",outline:"none",width:"100%",...extra}}/>
  );

  return(
    <div className="fu">
      <div style={{padding:"16px 18px 14px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:"env(safe-area-inset-top)",background:C.bg,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <BackBar onHome={onBack}/>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={toggleFavourite} title={existingFav?"Remove from favourites":"Save as favourite"}
              style={{background:existingFav?"#f7ecd2":"none",border:`1px solid ${existingFav?C.warn:C.border}`,borderRadius:20,color:existingFav?C.warn:C.dim,fontSize:16,padding:"9px 12px",cursor:"pointer",lineHeight:1}}>
              {existingFav?"★":"☆"}
            </button>
            <button onClick={save} style={{background:C.accent,border:"none",borderRadius:20,color:C.ink,fontSize:14,fontWeight:700,padding:"10px 18px",cursor:"pointer",letterSpacing:"0.04em"}}>SAVE</button>
          </div>
        </div>
        <div style={{fontSize:12,color:C.warn,letterSpacing:"0.1em",fontWeight:600}}>EDITING · {isCardio?"CARDIO":"GYM"}</div>
        <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:22,lineHeight:1.1,color:C.ink,marginTop:2}}>{draft.name}</div>
      </div>

      <div style={{padding:"14px 18px"}}>
        {/* Name + tag */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8,marginBottom:16}}>
          <div>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>NAME</div>
            {inp(draft.name,v=>upd("name",v),"Session name")}
          </div>
          <div>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>TAG</div>
            {inp(draft.tag,v=>upd("tag",v),"DAY 1")}
          </div>
        </div>

        {/* Cardio template change */}
        {isCardio&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:8}}>SESSION TYPE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {CARDIO_TEMPLATES.map((t,i)=>{
                const active=draft.template===t.name;
                return(
                  <button key={i} onClick={()=>changeTemplate(i)}
                    style={{background:active?C.blue:C.card,color:active?C.white:C.dim,border:`1px solid ${active?C.blue:C.border}`,borderRadius:6,fontSize:13,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                    {t.name}
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:8,fontSize:13,color:C.dim}}>Fields: {(draft.fields||[]).map(f=>f.label).join(", ")}</div>
          </div>
        )}

        {/* Gym exercises */}
        {!isCardio&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em"}}>EXERCISES</div>
              <div style={{fontSize:11,color:C.muted}}>⠿ hold to reorder</div>
            </div>
            {draft.exercises.map((ex,i)=>(
              <div key={ex.id||i} ref={el=>rowRefs.current[i]=el}
                style={{background:dragIdx===i?"#f2ece0":C.card,border:`1px solid ${overIdx===i&&dragIdx!=null&&dragIdx!==i?C.accent:C.border}`,borderRadius:5,padding:"12px",marginBottom:8,opacity:dragIdx===i?0.6:1,transition:"border-color 0.1s"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <div onPointerDown={e=>startDrag(i,e)} onTouchStart={e=>startDrag(i,e)}
                    style={{cursor:"grab",touchAction:"none",color:C.muted,fontSize:18,padding:"2px 6px",lineHeight:1,userSelect:"none"}}>⠿</div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <button onClick={()=>moveEx(i,-1)} disabled={i===0}
                      style={{background:"none",border:"none",color:i===0?C.muted:C.dim,fontSize:17,cursor:i===0?"default":"pointer",lineHeight:1,padding:"1px 4px"}}>▲</button>
                    <button onClick={()=>moveEx(i,1)} disabled={i===draft.exercises.length-1}
                      style={{background:"none",border:"none",color:i===draft.exercises.length-1?C.muted:C.dim,fontSize:17,cursor:i===draft.exercises.length-1?"default":"pointer",lineHeight:1,padding:"1px 4px"}}>▼</button>
                  </div>
                  <div style={{flex:1}}><ExerciseAutocomplete value={ex.name} onChange={v=>updEx(i,"name",v)} library={exerciseLibrary} onAddToLibrary={addToExerciseLibrary} placeholder="Exercise name"/></div>
                  <button onClick={()=>removeEx(i)} style={{background:"none",border:"none",color:C.red,fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
                </div>
                <div style={{display:"flex",gap:5,marginBottom:8}}>

                        {label}
                      </button>
                    );
                  })}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:6}}>
                  <div>
                    <div style={{fontSize:11,color:C.dim,marginBottom:4}}>SETS</div>
                    <input type="number" value={ex.sets} onChange={e=>updEx(i,"sets",e.target.value)} onBlur={e=>commitSets(i,e.target.value)} onFocus={e=>e.target.select()} min={1}
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:16,padding:"7px",outline:"none",width:"100%",textAlign:"center"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:C.dim,marginBottom:4}}>{ex.logType==="time"?"TARGET TIME":"REPS"}</div>
                    <input type="text" value={ex.reps} onChange={e=>updEx(i,"reps",e.target.value)} placeholder={ex.logType==="time"?"e.g. 30–60s":"e.g. 8–10"}
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:16,padding:"7px",outline:"none",width:"100%",textAlign:"center"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:C.dim,marginBottom:4}}>NOTE</div>
                    <input type="text" value={ex.note} onChange={e=>updEx(i,"note",e.target.value)} placeholder="Optional"

                  </div>
                </div>
              </div>

            {!addOpen?(

                <div style={{display:"flex",flexDirection:"column",gap:7}}>

                      style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:14,padding:"10px",cursor:"pointer"}}>CANCEL</button>
                    <button onClick={addEx}
                      style={{flex:2,background:C.accent,border:"none",borderRadius:5,color:C.ink,fontSize:14,fontWeight:500,padding:"10px",cursor:"pointer",letterSpacing:"0.08em"}}>ADD</button>
                  </div>
                </div>
              </div>
            )}
          </>
        )}

        {/* Delete day */}
        <div style={{marginTop:24,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:8,fontWeight:600}}>DANGER ZONE</div>
          {!confirmDelete?(
            <button onClick={()=>setConfirmDelete(true)}
              style={{background:"none",border:`1px solid ${C.red}55`,borderRadius:5,color:C.red,fontSize:13,padding:"9px 14px",cursor:"pointer",letterSpacing:"0.04em",fontWeight:600}}>
              Delete this day
            </button>
          ):(
            <div style={{background:"#f7e3df",border:`1px solid ${C.red}44`,borderRadius:5,padding:"12px 14px"}}>
              <div style={{fontSize:14,color:C.mid,marginBottom:10}}>This removes "{draft.name}" from your programme. Past logged sessions for it are kept in Stats.</div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>setConfirmDelete(false)} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:14,padding:"9px",cursor:"pointer"}}>CANCEL</button>
                <button onClick={()=>onDelete(dayIdx)} style={{flex:1,background:C.red,border:"none",borderRadius:5,color:C.white,fontSize:14,fontWeight:600,padding:"9px",cursor:"pointer"}}>DELETE DAY</button>
              </div>
            </div>
          )}
        </div>

        {/* Reset */}
        <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          {!confirmReset?(
            <button onClick={()=>setConfirmReset(true)}
              style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:13,padding:"9px 14px",cursor:"pointer",letterSpacing:"0.08em"}}>
              Reset all days to default
            </button>
          ):(
            <div style={{background:"#f7e3df",border:`1px solid ${C.red}44`,borderRadius:5,padding:"12px 14px"}}>
              <div style={{fontSize:14,color:C.mid,marginBottom:10}}>Resets ALL days to original programme. Logs are kept.</div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>setConfirmReset(false)} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:14,padding:"9px",cursor:"pointer"}}>CANCEL</button>
                <button onClick={resetAll} style={{flex:1,background:C.red,border:"none",borderRadius:5,color:C.white,fontSize:14,padding:"9px",cursor:"pointer"}}>RESET</button>
              </div>
            </div>
          )}
        </div>
        <div style={{marginTop:20}}><BackBar onHome={onBack} label="Back"/></div>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ── EX LOGGER ─────────────────────────────────────────────────────────────────
const LOG_FIELDS={
  weight:[{key:"w",label:"KG"},{key:"r",label:"REPS"}],
  bodyweight:[{key:"r",label:"REPS"}],
  time:[{key:"dur",label:"TIME (s)"}],
};
function ExLogger({ex,data,prev,setSet,showRPE,getOrder}){
  const [open,setOpen]=useState(true);
  const sets=data?.sets||[];
  const logType=ex.logType||"weight";
  const fields=showRPE?[...LOG_FIELDS[logType],{key:"rpe",label:"RPE"}]:LOG_FIELDS[logType];
  const primaryKey=LOG_FIELDS[logType][0].key;
  const hasPrev=prev?.sets?.some(s=>s?.[primaryKey]);
  const cols=`24px repeat(${fields.length},1fr) 1fr`;

  function prevLabel(ps){
    if(!ps)return"—";
    if(logType==="weight")return ps.w?`${ps.w}kg`:"—";
    if(logType==="bodyweight")return ps.r?`${ps.r} reps`:"—";
    return ps.dur?fmtDuration(ps.dur):"—";
  }
  function copySet(si){
    const ps=prev?.sets?.[si];
    if(!ps)return;
    ["w","r","rpe","dur"].forEach(k=>{if(ps[k]!=null)setSet(si,k,ps[k]);});
  }
  function copyAll(){
    Array.from({length:Math.max(0,parseInt(ex.sets)||0)}).forEach((_,si)=>copySet(si));
  }
  return(
    <div style={{borderBottom:`1px solid ${C.border}`,paddingTop:13,paddingBottom:4}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:open?8:0}}>
        <div onClick={()=>setOpen(o=>!o)} style={{cursor:"pointer",flex:1}}>
          <div style={{fontSize:15,color:C.text}}>{ex.name}</div>
          <div style={{fontSize:12,color:C.dim,marginTop:2}}>
            {ex.sets} sets · {logType==="time"?"time":ex.reps}{logType==="bodyweight"?" · bodyweight":""}{ex.note?` · ${ex.note}`:""}
          </div>
        </div>
        {open&&hasPrev&&(
          <button onClick={copyAll} style={{background:"#f7e6d2",border:`1px solid ${C.accent}44`,borderRadius:6,color:C.accent,fontSize:11,fontWeight:600,padding:"5px 9px",cursor:"pointer",whiteSpace:"nowrap",marginRight:8}}>
            ↺ Use last time
          </button>
        )}
        <span onClick={()=>setOpen(o=>!o)} style={{color:C.muted,fontSize:16,transform:open?"rotate(90deg)":"none",transition:"0.15s",cursor:"pointer"}}>›</span>
      </div>
      {open&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:cols,gap:4,marginBottom:4}}>
            {["",...fields.map(f=>f.label),"PREV"].map((h,i)=>(
              <div key={i} style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",textAlign:"center"}}>{h}</div>
            ))}
          </div>
          {Array.from({length:Math.max(0,parseInt(ex.sets)||0)}).map((_,si)=>{
            const ps=prev?.sets?.[si];const filled=sets[si]?.[primaryKey];
            return(
              <div key={si} style={{display:"grid",gridTemplateColumns:cols,gap:4,marginBottom:4,alignItems:"center"}}>
                <div style={{fontSize:12,color:C.muted,textAlign:"center"}}>{si+1}</div>
                {fields.map(f=>(
                  <input key={f.key} type={f.key==="rpe"?"text":"number"} value={sets[si]?.[f.key]||""} placeholder="—"
                    data-order={getOrder?getOrder():undefined} onKeyDown={handleEnterNav} enterKeyHint="next"
                    onChange={e=>setSet(si,f.key,e.target.value)} onFocus={e=>e.target.select()}
                    style={{background:C.surface,border:"1px solid",borderColor:filled?C.accent+"44":C.border,borderRadius:6,color:C.text,fontSize:16,padding:"8px 4px",textAlign:"center",outline:"none",width:"100%"}}/>
                ))}
                {ps&&ps[primaryKey]?(
                  <button onClick={()=>copySet(si)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.blue,fontSize:13,padding:"8px 2px",cursor:"pointer",fontWeight:600}}>
                    {prevLabel(ps)}
                  </button>
                ):(
                  <div style={{fontSize:13,color:C.dim,textAlign:"center"}}>—</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── FOOD TAB ─────────────────────────────────────────────────────────────────
function FoodTab({flogs,saveFood,proteinTarget,calorieTarget,saveProteinTarget,saveCalorieTarget}){
  const today=dateKey();
  const [weekStart,setWeekStart]=useState(()=>getWeekStart());
  const [date,setDate]=useState(today);
  const [meals,setMeals]=useState(flogs[today]||[]);
  const [mode,setMode]=useState("search");
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [searching,setSrch]=useState(false);
  const [noRes,setNoRes]=useState(false);
  const [pending,setPending]=useState(null);
  const [grams,setGrams]=useState("");
  const [custom,setCustom]=useState({name:"",protein:"",calories:""});
  const [editTargets,setEditTargets]=useState(false);
  const [pTargetDraft,setPTargetDraft]=useState(String(proteinTarget));
  const [cTargetDraft,setCTargetDraft]=useState(String(calorieTarget));
  const timer=useRef(null);

  function changeWeek(ws){setWeekStart(ws);setDate(ws);}
  const weekDays=Array.from({length:7}).map((_,i)=>addDays(weekStart,i));

  function openEditTargets(){setPTargetDraft(String(proteinTarget));setCTargetDraft(String(calorieTarget));setEditTargets(true);}
  function saveTargets(){
    const p=parseInt(pTargetDraft)||proteinTarget;const c=parseInt(cTargetDraft)||calorieTarget;
    saveProteinTarget(p);saveCalorieTarget(c);setEditTargets(false);
  }

  useEffect(()=>{setMeals(flogs[date]||[]);},[date,flogs]);
  useEffect(()=>{
    if(mode!=="search")return;
    if(!query.trim()){setResults([]);setNoRes(false);return;}
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      setSrch(true);setNoRes(false);
      try{const r=await searchFoods(query);setResults(r);setNoRes(r.length===0);}
      catch{setNoRes(true);}
      setSrch(false);
    },700);
    return()=>clearTimeout(timer.current);
  },[query,mode]);

  function addMeal(item){const next=[...meals,{...item,id:Date.now()}];setMeals(next);saveFood(date,next);}
  function removeMeal(id){const next=meals.filter(m=>m.id!==id);setMeals(next);saveFood(date,next);}
  function selectResult(f){setPending(f);setGrams(String(Math.round(f.serving)||100));}
  function confirmAdd(){
    const g=parseFloat(grams)||100;
    addMeal({name:`${pending.name} (${g}g)`,protein:Math.round(pending.protein100*g/100),calories:Math.round(pending.calories100*g/100)});
    setPending(null);setGrams("");setQuery("");setResults([]);
  }
  function addCustom(){
    if(!custom.name||!custom.protein)return;
    addMeal({name:custom.name,protein:parseFloat(custom.protein)||0,calories:parseFloat(custom.calories)||0});
    setCustom({name:"",protein:"",calories:""});
  }

  const totalP=meals.reduce((s,m)=>s+(m.protein||0),0);
  const totalC=meals.reduce((s,m)=>s+(m.calories||0),0);
  const pPct=Math.min(100,(totalP/proteinTarget)*100);
  const cPct=Math.min(100,(totalC/calorieTarget)*100);

  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:12,color:C.dim,letterSpacing:"0.15em"}}>DAILY TRACKER</div>
          <button onClick={openEditTargets} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontSize:12,padding:"4px 9px",cursor:"pointer",fontWeight:600}}>Edit targets</button>
        </div>
        <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:36,fontWeight:700,color:C.ink,lineHeight:1}}>Nutrition</div>

        <div style={{marginTop:14}}>
          <WeekNav weekStart={weekStart} onChange={changeWeek}/>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:14}}>
          {weekDays.map(d=>{
            const dayMeals=flogs[d]||[];
            const dayP=dayMeals.reduce((s,m)=>s+(m.protein||0),0);
            const hit=dayP>=proteinTarget;
            const isSel=d===date;
            const dObj=parseDateKey(d);
            return(
              <button key={d} onClick={()=>setDate(d)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:isSel?C.accent:C.card,border:`1px solid ${isSel?C.accent:C.border}`,borderRadius:5,padding:"7px 2px",cursor:"pointer"}}>
                <span style={{fontSize:10,color:isSel?C.ink:C.dim,fontWeight:600}}>{dObj.toLocaleDateString("en-GB",{weekday:"short"}).slice(0,2)}</span>
                <span style={{fontSize:14,color:isSel?C.ink:C.text,fontWeight:700}}>{dObj.getDate()}</span>
                <span style={{width:5,height:5,borderRadius:"50%",background:dayMeals.length?(hit?(isSel?C.ink:C.green):(isSel?C.ink+"88":C.muted)):"transparent"}}/>
              </button>
            );
          })}
        </div>

        {editTargets&&(
          <div className="su" style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:6,padding:12,marginBottom:14}}>
            <div style={{fontSize:12,color:C.accent,letterSpacing:"0.1em",marginBottom:10,fontWeight:600}}>DAILY TARGETS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div>
                <div style={{fontSize:11,color:C.dim,marginBottom:4}}>PROTEIN (G)</div>
                <input type="number" value={pTargetDraft} onChange={e=>setPTargetDraft(e.target.value)}
                  style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:14,padding:"8px 10px",outline:"none"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.dim,marginBottom:4}}>CALORIES (KCAL)</div>
                <input type="number" value={cTargetDraft} onChange={e=>setCTargetDraft(e.target.value)}
                  style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:14,padding:"8px 10px",outline:"none"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>setEditTargets(false)} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:13,padding:"9px",cursor:"pointer"}}>CANCEL</button>
              <button onClick={saveTargets} style={{flex:2,background:C.accent,border:"none",borderRadius:5,color:C.ink,fontSize:13,fontWeight:700,padding:"9px",cursor:"pointer"}}>SAVE</button>
            </div>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"PROTEIN",val:Math.round(totalP),target:proteinTarget,unit:"g",pct:pPct,color:C.accent},
            {label:"CALORIES",val:Math.round(totalC),target:calorieTarget,unit:"kcal",pct:cPct,color:C.warn}].map(({label,val,target,unit,pct,color})=>(
            <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"12px 14px"}}>
              <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:7}}>
                <span style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:30,fontWeight:700,color:pct>=100?color:C.ink,lineHeight:1}}>{val}</span>
                <span style={{fontSize:12,color:C.dim}}>/ {target}{unit}</span>
              </div>
              <div style={{height:3,background:C.muted,borderRadius:2}}>
                <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:12,color:pct>=100?color:C.dim,marginTop:4}}>{pct>=100?"✓ TARGET HIT":`${target-val}${unit} to go`}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 18px 0"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>LOGGED</div>
        {meals.length===0&&<div style={{fontSize:14,color:C.muted,paddingBottom:8}}>Nothing logged yet</div>}
        {meals.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1}}>
              <div style={{fontSize:15,color:C.text}}>{m.name}</div>
              <div style={{fontSize:13,color:C.dim,marginTop:1}}>{m.protein}g protein · {m.calories} kcal</div>
            </div>
            <button onClick={()=>removeMeal(m.id)} style={{background:"none",border:"none",color:C.muted,fontSize:24,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
          </div>
        ))}
      </div>

      <div style={{padding:"14px 18px"}}>
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["search","SEARCH"],["quick","QUICK ADD"],["custom","CUSTOM"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setPending(null);setQuery("");setResults([]);}}
              style={{flex:1,background:mode===m?C.accent:C.card,color:mode===m?C.ink:C.dim,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,fontSize:12,padding:"7px 3px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
              {l}
            </button>
          ))}
        </div>

        {mode==="search"&&!pending&&(
          <div>
            <div style={{position:"relative",marginBottom:9}}>
              <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search any food or brand…"
                style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:5,color:C.text,fontSize:15,padding:"11px 12px 11px 34px",outline:"none"}}/>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:18,color:C.dim}}>⌕</span>
              {searching&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:14,height:14,border:`2px solid ${C.muted}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>}
            </div>
            {noRes&&<div style={{fontSize:14,color:C.muted,marginBottom:8}}>No results — try different terms or use Custom</div>}
            {!query&&<div style={{fontSize:13,color:C.dim}}>Type to search millions of foods</div>}
            <div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
              {results.map((f,i)=>(
                <button key={i} onClick={()=>selectResult(f)}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"10px 12px",textAlign:"left",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                    <div style={{fontSize:15,color:C.text}}>{f.name.length>42?f.name.slice(0,42)+"…":f.name}</div>
                    {f.generic&&<span style={{fontSize:10,color:C.accent,background:"#f7e6d2",padding:"1px 6px",borderRadius:4,fontWeight:600,letterSpacing:"0.04em"}}>COMMON</span>}
                  </div>
                  <div style={{fontSize:13,color:C.dim}}>per 100g: {Math.round(f.protein100)}g protein · {Math.round(f.calories100)} kcal</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {mode==="search"&&pending&&(
          <div className="fu" style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:6,padding:14}}>
            <div style={{fontSize:15,color:C.text,marginBottom:3}}>{pending.name.length>42?pending.name.slice(0,42)+"…":pending.name}</div>
            <div style={{fontSize:13,color:C.dim,marginBottom:12}}>per 100g: {Math.round(pending.protein100)}g protein · {Math.round(pending.calories100)} kcal</div>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>HOW MUCH?</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {[50,75,100,150,200,250].map(g=>(
                <button key={g} onClick={()=>setGrams(String(g))}
                  style={{background:grams===String(g)?C.accent:C.surface,color:grams===String(g)?C.ink:C.dim,border:`1px solid ${grams===String(g)?C.accent:C.border}`,borderRadius:6,fontSize:14,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                  {g}g
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
              <input type="number" value={grams} onChange={e=>setGrams(e.target.value)} placeholder="grams"
                style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,color:C.text,fontSize:18,padding:"9px 12px",outline:"none",textAlign:"center"}}/>
              <span style={{fontSize:14,color:C.dim}}>g</span>
            </div>
            {grams&&<div style={{fontSize:14,color:C.mid,marginBottom:12,textAlign:"center"}}>= {Math.round(pending.protein100*parseFloat(grams||0)/100)}g protein · {Math.round(pending.calories100*parseFloat(grams||0)/100)} kcal</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setPending(null);setGrams("");}} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:14,padding:11,cursor:"pointer"}}>BACK</button>
              <button onClick={confirmAdd} style={{flex:2,background:C.accent,border:"none",borderRadius:5,color:C.ink,fontSize:14,fontWeight:500,padding:11,cursor:"pointer",letterSpacing:"0.08em"}}>ADD TO LOG</button>
            </div>
          </div>
        )}

        {mode==="quick"&&(
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {QUICK_PRESETS.map(f=>(
              <button key={f.name} onClick={()=>addMeal({...f,id:Date.now()})}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"10px 12px",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15,color:C.text}}>{f.name}</span>
                <span style={{fontSize:13,color:C.dim}}>{f.protein}g · {f.calories}kcal</span>
              </button>
            ))}
          </div>
        )}

        {mode==="custom"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:13,color:C.dim,marginBottom:2}}>Enter macros manually for home-cooked meals</div>
            {[["name","Food name","text"],["protein","Protein (g)","number"],["calories","Calories (kcal)","number"]].map(([k,ph,t])=>(
              <input key={k} type={t} value={custom[k]} onChange={e=>setCustom(p=>({...p,[k]:e.target.value}))} placeholder={ph}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,color:C.text,fontSize:15,padding:"11px 12px",outline:"none"}}/>
            ))}
            <button onClick={addCustom} style={{background:C.accent,color:C.ink,border:"none",borderRadius:5,padding:12,fontSize:14,fontWeight:500,letterSpacing:"0.1em",cursor:"pointer"}}>ADD FOOD</button>
          </div>
        )}
      </div>
      <div style={{height:16}}/>
    </div>
  );
}

// ── WEIGHT TAB ────────────────────────────────────────────────────────────────
function WeightTab({bwlogs,saveBW,deleteBW}){
  const [date,setDate]=useState(dateKey());
  const [w,setW]=useState(bwlogs[dateKey()]!=null?String(bwlogs[dateKey()]):"");
  const [saved,setSaved]=useState(false);
  const [confirmDelDate,setConfirmDelDate]=useState(null);
  const [weekStart,setWeekStart]=useState(()=>getWeekStart());

  useEffect(()=>{setW(bwlogs[date]!=null?String(bwlogs[date]):"");setSaved(false);},[date]);

                style={{width:"100%",boxSizing:"border-box",background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,color:C.text,fontSize:14,padding:"9px 10px",outline:"none"}}/>

      <div style={{padding:"18px 18px 0"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>TREND (ALL-TIME)</div>
        {data.length===0?(
          <div style={{fontSize:14,color:C.muted}}>Log your weight above to start seeing your trend here</div>
        ):(()=>{
          const maxW=Math.max(...data.map(d=>d.w));const minW=Math.min(...data.map(d=>d.w));
          return(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                <div>

                  <div style={{fontSize:12,color:C.dim,marginTop:2}}>latest logged</div>
                </div>
                {data.length>1&&(
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:26,color:diff>0?C.red:(diff<0?C.green:C.dim),lineHeight:1}}>{diff>0?"+":""}{diff.toFixed(1)}kg</div>
                    <div style={{fontSize:12,color:C.dim,marginTop:2}}>vs first logged</div>

              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                {data.map((d,i)=>{
                  const h=maxW===minW?40:8+((d.w-minW)/(maxW-minW))*52;const isLast=i===data.length-1;

                      {isLast&&<div style={{fontSize:11,color:C.blue}}>{d.w}kg</div>}

          );

      </div>

      <div style={{padding:"18px 18px 24px"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>HISTORY</div>
        <WeekNav weekStart={weekStart} onChange={setWeekStart}/>
        {weekData.length===0?(
          <div style={{fontSize:14,color:C.muted}}>No entries logged this week</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[...weekData].reverse().map(d=>(
