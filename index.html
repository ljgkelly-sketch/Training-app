// ── STATS TAB ─────────────────────────────────────────────────────────────────
function buildProteinSeries(flogs,period,range){
  if(period==="week"){
    return Array.from({length:7}).map((_,i)=>{
      const d=addDays(range.end,-6+i);
      const meals=flogs[d]||[];
      return{label:parseDateKey(d).toLocaleDateString("en-GB",{weekday:"short"}),protein:meals.reduce((s,m)=>s+m.protein,0),date:d};
    });
  }
  const totalDays=Math.round((new Date(range.end)-new Date(range.start))/86400000)+1;
  const bucketDays=Math.max(1,Math.round(totalDays/7));
  const buckets=[];
  let cursor=range.start;
  while(cursor<=range.end){
    const bucketEnd=addDays(cursor,bucketDays-1)>range.end?range.end:addDays(cursor,bucketDays-1);
    let sum=0,days=0,d=cursor;
    while(d<=bucketEnd){sum+=(flogs[d]||[]).reduce((s,m)=>s+m.protein,0);days++;d=addDays(d,1);}
    buckets.push({label:fmtDate(cursor),protein:Math.round(sum/days),date:cursor});
    cursor=addDays(bucketEnd,1);
  }
  return buckets;
}

const PERIODS=[["week","Week"],["month","Month"],["quarter","3 Months"],["half","6 Months"],["year","Year"]];

function StatsTab({wlogs,flogs,prog,unit,bwlogs,proteinTarget}){
  const [period,setPeriod]=useState("month");
  const [progTab,setProgTab]=useState("gym");
  const [selEx,setSelEx]=useState(null);
  const [selCardio,setSelCardio]=useState(null);
  const [selSessionType,setSelSessionType]=useState(null);
  const [expandedLogKey,setExpandedLogKey]=useState(null);
  const [pendingImport,setPendingImport]=useState(null);
  const [importMsg,setImportMsg]=useState(null);
  const [showBackup,setShowBackup]=useState(false);
  const fileInputRef=useRef(null);
  const range=periodRange(period);

  const BACKUP_KEYS=["prog","wlogs","flogs","bwlogs","favourites","exerciseLibrary","proteinTarget","calorieTarget","unit","showRPE"];
  function exportBackup(){
    const data={};
    BACKUP_KEYS.forEach(k=>{const v=lsGet(k);if(v!==null)data[k]=v;});
    data._exportedAt=new Date().toISOString();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`training-backup-${dateKey()}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function handleImportFile(e){
    const file=e.target.files?.[0];
    if(!file)return;
    setImportMsg(null);
    const reader=new FileReader();
    reader.onload=()=>{
      try{setPendingImport(JSON.parse(reader.result));}
      catch{setImportMsg("error");}
    };
    reader.readAsText(file);
    e.target.value="";
  }
  function confirmImport(){
    BACKUP_KEYS.forEach(k=>{if(pendingImport[k]!==undefined)lsSet(k,pendingImport[k]);});
    window.location.reload();
  }

  function classifyLog(l){
    if(l.dayType)return l.dayType;
    const d=prog.find(p=>p.id===l.dayId);
    return d?.type||TYPE_GYM;
  }
  function logDayName(l){
    return l.dayName||prog.find(p=>p.id===l.dayId)?.name||(classifyLog(l)===TYPE_CARDIO?"Cardio session":"Workout");
  }
  function cardioFieldLabel(id){
    for(const t of CARDIO_TEMPLATES){
      const f=t.fields.find(ff=>ff.id===id);
      if(f)return f.label;
    }
    return id;
  }

  const allEx=(()=>{
    const seen={};
    Object.values(wlogs).forEach(l=>{
      Object.entries(l.data?.sets||{}).forEach(([exId,d])=>{
        if(!d||!d.sets)return; // skip cardio flat-field logs
        if(!seen[exId]){
          seen[exId]={
            name:d.name||prog.flatMap(p=>p.exercises||[]).find(e=>e.id===exId)?.name||"Exercise",
            logType:d.logType||prog.flatMap(p=>p.exercises||[]).find(e=>e.id===exId)?.logType||"weight",
          };
        }
      });
    });
    return Object.entries(seen).map(([id,v])=>({id,name:v.name,logType:v.logType}));
  })();
  const selExInfo=allEx.find(e=>e.id===selEx);
  const selLogType=selExInfo?.logType||"weight";
  function metricVal(s,logType){
    if(logType==="weight")return parseFloat(s.w);
    if(logType==="bodyweight")return parseFloat(s.r);
    return parseFloat(s.dur);
  }
  function metricLabel(val,logType){
    if(logType==="weight")return`${val}kg`;
    if(logType==="bodyweight")return`${val} reps`;
    return fmtDuration(val);
  }
  const exData=selEx?Object.values(wlogs).filter(l=>inRange(l.date,range.start,range.end)).map(l=>{
    const d=l.data?.sets?.[selEx];if(!d?.sets)return null;
    const logType=d.logType||selLogType;
    const valid=d.sets.map(s=>({val:metricVal(s,logType),r:s.r})).filter(s=>s.val);
    if(!valid.length)return null;
    const top=valid.reduce((a,b)=>b.val>a.val?b:a);
    return{date:l.date,max:top.val,reps:top.r||"",sets:valid.length};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date)):[];
  const exPB=exData.length?exData.reduce((a,b)=>b.max>a.max?b:a):null;

  const cardioDays=(()=>{
    const real=prog.filter(d=>d.type===TYPE_CARDIO);
    const realIds=new Set(prog.map(d=>d.id));
    const ghostMap={};
    Object.values(wlogs).forEach(l=>{
      if(realIds.has(l.dayId))return;
      if(l.dayType!==TYPE_CARDIO)return;
      if(!ghostMap[l.dayId]||l.date>ghostMap[l.dayId].date)ghostMap[l.dayId]=l;
    });
    const ghosts=Object.entries(ghostMap).map(([id,l])=>({
      id,name:(l.dayName||"Run")+" (deleted)",type:TYPE_CARDIO,template:l.dayTemplate||"Custom",tag:l.dayTag||"",
    }));
    return[...real,...ghosts];
  })();
  const selCardioDay=cardioDays.find(d=>d.id===selCardio);
  const cardioTmpl=selCardioDay?(CARDIO_TEMPLATES.find(t=>t.name===selCardioDay.template)||CARDIO_TEMPLATES[6]):null;
  const cardioSessions=selCardio?Object.values(wlogs).filter(l=>l.dayId===selCardio&&inRange(l.date,range.start,range.end)).sort((a,b)=>a.date.localeCompare(b.date)):[];
  const cardioHasPace=cardioTmpl?.calcPace;
  const cardioPaceData=cardioHasPace?cardioSessions.map(l=>{
    const dist=parseFloat(l.data?.sets?.distance),dur=parseFloat(l.data?.sets?.duration);
    if(!dist||!dur)return null;
    const distKm=unit==="mi"?dist*1.60934:dist;
    return{date:l.date,distance:dist,duration:dur,paceVal:dur/distKm,paceStr:calcPaceStr(String(dist),String(dur),unit)};
  }).filter(Boolean):[];
  const cardioPB=cardioPaceData.length?{
    fastest:cardioPaceData.reduce((a,b)=>b.paceVal<a.paceVal?b:a),
    longest:cardioPaceData.reduce((a,b)=>b.distance>a.distance?b:a),
  }:null;

  const proteinSeries=buildProteinSeries(flogs,period,range);
  const maxBar=Math.max(...proteinSeries.map(d=>d.protein),proteinTarget);

  const bwData=Object.entries(bwlogs||{}).map(([d,val])=>({date:d,w:parseFloat(val)})).filter(d=>!isNaN(d.w)&&inRange(d.date,range.start,range.end)).sort((a,b)=>a.date.localeCompare(b.date));

  // session counts within selected period
  const wlogsInRange=Object.values(wlogs).filter(l=>inRange(l.date,range.start,range.end));
  const cardioCount=wlogsInRange.filter(l=>{
    if(l.dayType)return l.dayType===TYPE_CARDIO;
    const d=prog.find(p=>p.id===l.dayId);
    return d?.type===TYPE_CARDIO;
  }).length;
  const gymCount=wlogsInRange.length-cardioCount;

  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:12,color:C.dim,letterSpacing:"0.15em"}}>OVERVIEW</div>
            <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:36,fontWeight:700,color:C.ink,lineHeight:1}}>Stats</div>
          </div>
          <select value={period} onChange={e=>setPeriod(e.target.value)}
            style={{marginTop:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:5,color:C.ink,fontSize:13,fontWeight:600,padding:"8px 10px",cursor:"pointer",outline:"none"}}>
            {PERIODS.map(([id,label])=><option key={id} value={id}>{label}</option>)}
          </select>
        </div>
      </div>
      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:12}}>PROTEIN {period==="week"?"— LAST 7 DAYS":`— WEEKLY AVERAGE, LAST ${PERIODS.find(p=>p[0]===period)[1].toUpperCase()}`}</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90,position:"relative"}}>
          <div style={{position:"absolute",left:0,right:0,bottom:`${(proteinTarget/maxBar)*86}px`,borderTop:`1px dashed ${C.accent}44`,pointerEvents:"none"}}>
            <span style={{fontSize:11,color:C.accent+"88",position:"absolute",right:0,top:-10}}>{proteinTarget}g</span>
          </div>
          {proteinSeries.map((d,i)=>{
            const h=maxBar>0?(d.protein/maxBar)*80:0;const hit=d.protein>=proteinTarget;
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end"}}>
                {d.protein>0&&<div style={{fontSize:11,color:hit?C.accent:C.mid}}>{d.protein}g</div>}
                <div style={{width:"100%",height:Math.max(3,h),background:hit?C.accent:C.muted,borderRadius:"3px 3px 0 0",transition:"height 0.4s"}}/>
                <div style={{fontSize:11,color:C.dim}}>{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>SESSIONS — LAST {PERIODS.find(p=>p[0]===period)[1].toUpperCase()}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[{label:"Gym sessions",val:gymCount,color:C.accent,type:TYPE_GYM},{label:"Cardio sessions",val:cardioCount,color:C.blue,type:TYPE_CARDIO},{label:"Days trained",val:new Set(wlogsInRange.map(l=>l.date)).size,color:C.ink,type:null}].map(({label,val,color,type})=>{
            const clickable=type&&val>0;
            const active=selSessionType===type;
            return(
              <button key={label} onClick={()=>{if(!clickable)return;setSelSessionType(active?null:type);setExpandedLogKey(null);}}
                disabled={!clickable}
                style={{background:active?"#f2ece0":C.card,border:`1px solid ${active?color:C.border}`,borderRadius:5,padding:"12px 10px",textAlign:"left",cursor:clickable?"pointer":"default"}}>
                <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:30,color,lineHeight:1}}>{val}</div>
                <div style={{fontSize:11,color:C.dim,marginTop:3}}>{label}</div>
              </button>
            );
          })}
        </div>
        {selSessionType&&(()=>{
          const logs=wlogsInRange.filter(l=>classifyLog(l)===selSessionType).sort((a,b)=>b.date.localeCompare(a.date));
          return(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:C.dim,marginBottom:8}}>{selSessionType===TYPE_CARDIO?"CARDIO":"GYM"} SESSIONS ({logs.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {logs.map(l=>{
                  const key=l.dayId+"__"+l.date;
                  const expanded=expandedLogKey===key;
                  const name=logDayName(l);
                  return(
                    <div key={key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden"}}>

                        <div>
                          <div style={{fontSize:14,color:C.ink,fontWeight:600}}>{name}</div>
                          <div style={{fontSize:12,color:C.dim,marginTop:1}}>{fmtDate(l.date)}</div>
                        </div>
                        <span style={{color:C.muted,fontSize:16,transform:expanded?"rotate(90deg)":"none",transition:"0.15s"}}>›</span>
                      </button>
                      {expanded&&(
                        <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:8}}>

                              const logType=d.logType||"weight";
                              const setLabels=d.sets.map(s=>{
                                if(logType==="weight")return s.w?`${s.w}kg${s.r?` × ${s.r}`:""}`:null;
                                if(logType==="bodyweight")return s.r?`${s.r} reps`:null;
                                return s.dur?fmtDuration(s.dur):null;

                              if(!setLabels.length)return null;
                              return(
                                <div key={exId} style={{background:C.surface,borderRadius:6,padding:"8px 11px"}}>
                                  <div style={{fontSize:13,color:C.ink,fontWeight:600,marginBottom:5}}>{d.name||"Exercise"}</div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                    {setLabels.map((s,si)=><span key={si} style={{fontSize:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 7px",color:C.mid}}>{s}</span>)}
                                  </div>

                              );

                          {l.data?.note&&(
                            <div style={{background:C.surface,borderRadius:6,padding:"8px 11px"}}>

                              <div style={{fontSize:13,color:C.text}}>{l.data.note}</div>
                            </div>

                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );

      </div>

      <div style={{padding:"0 18px 24px"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>BODYWEIGHT</div>
        {bwData.length===0?(
          <div style={{fontSize:14,color:C.muted}}>No bodyweight logged in this period — log it from the Weight tab</div>
        ):(()=>{
          const maxW=Math.max(...bwData.map(d=>d.w));const minW=Math.min(...bwData.map(d=>d.w));
          const diff=bwData.length>1?bwData[bwData.length-1].w-bwData[0].w:0;
          return(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>

                  <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:32,fontWeight:700,color:C.ink,lineHeight:1}}>{bwData[bwData.length-1].w}kg</div>
                  <div style={{fontSize:12,color:C.dim,marginTop:2}}>latest in period</div>

                {bwData.length>1&&(
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:26,color:diff>0?C.red:(diff<0?C.green:C.dim),lineHeight:1}}>{diff>0?"+":""}{diff.toFixed(1)}kg</div>

                )}
              </div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                {bwData.map((d,i)=>{
                  const h=maxW===minW?40:8+((d.w-minW)/(maxW-minW))*52;const isLast=i===bwData.length-1;
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      {isLast&&<div style={{fontSize:11,color:C.blue}}>{d.w}kg</div>}
                      <div style={{width:"100%",height:h,background:isLast?C.blue:C.muted,borderRadius:"2px 2px 0 0"}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:C.dim}}>
                <span>{fmtDate(bwData[0].date)}</span><span>{fmtDate(bwData[bwData.length-1].date)}</span>
              </div>
            </div>
          );
        })()}
      </div>

      <div style={{padding:"0 18px 24px"}}>
        <div style={{fontSize:12,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>EXERCISE PROGRESS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[["gym","⬡ GYM"],["run","◈ RUNNING / CARDIO"]].map(([id,label])=>(
            <button key={id} onClick={()=>setProgTab(id)}
              style={{padding:"11px",background:progTab===id?(id==="run"?"#e8effe":"#f7e6d2"):C.card,border:`1px solid ${progTab===id?(id==="run"?C.blue:C.accent):C.border}`,borderRadius:5,color:progTab===id?(id==="run"?C.blue:C.accent):C.dim,fontSize:13,fontWeight:600,cursor:"pointer",letterSpacing:"0.04em"}}>
              {label}
            </button>
          ))}
        </div>

        {progTab==="gym"&&(
          allEx.length===0?(
            <div style={{fontSize:14,color:C.muted}}>Log gym sessions to see lift progress</div>
          ):(
            <div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
                {allEx.map(e=>(
                  <button key={e.id} onClick={()=>setSelEx(selEx===e.id?null:e.id)}
                    style={{background:selEx===e.id?C.accent:C.card,color:selEx===e.id?C.ink:C.dim,border:`1px solid ${selEx===e.id?C.accent:C.border}`,borderRadius:20,fontSize:12,padding:"5px 10px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
                    {e.name.length>20?e.name.slice(0,20)+"…":e.name}
                  </button>
                ))}
              </div>
              {selEx&&exData.length>0&&(()=>{
                const maxW=Math.max(...exData.map(d=>d.max));const minW=Math.min(...exData.map(d=>d.max));
                const diff=exData[exData.length-1].max-exData[0].max;
                const latest=exData[exData.length-1];
                const diffLabel=selLogType==="weight"?`${diff>=0?"+":""}${diff.toFixed(1)}kg`
                  :selLogType==="bodyweight"?`${diff>=0?"+":""}${Math.round(diff)} reps`
                  :`${diff>=0?"+":""}${Math.round(diff)}s`;
                const topLabel=selLogType==="weight"?"latest top set":selLogType==="bodyweight"?"latest best set":"latest best hold";
                return(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:32,fontWeight:700,color:C.ink,lineHeight:1}}>{metricLabel(latest.max,selLogType)}</div>
                        <div style={{fontSize:12,color:C.dim,marginTop:2}}>{topLabel}{selLogType==="weight"&&latest.reps?` · ${latest.reps} reps`:""}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:26,color:diff>=0?C.green:C.red,lineHeight:1}}>{diffLabel}</div>
                        <div style={{fontSize:12,color:C.dim,marginTop:2}}>vs first session</div>
                      </div>
                    </div>
                    {exPB&&(
                      <div style={{display:"flex",alignItems:"center",gap:6,background:"#f7ecd2",border:`1px solid ${C.warn}33`,borderRadius:5,padding:"7px 10px",marginBottom:12}}>
                        <span style={{fontSize:14}}>🏆</span>
                        <span style={{fontSize:12,color:C.mid}}>PB: <b style={{color:C.ink}}>{metricLabel(exPB.max,selLogType)}{selLogType==="weight"&&exPB.reps?` × ${exPB.reps}`:""}</b> on {fmtDate(exPB.date)}</span>
                      </div>
                    )}
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                      {exData.map((d,i)=>{
                        const h=maxW===minW?40:8+((d.max-minW)/(maxW-minW))*52;const isLast=i===exData.length-1;
                        return(
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                            {isLast&&<div style={{fontSize:11,color:C.accent}}>{metricLabel(d.max,selLogType)}</div>}
                            <div style={{width:"100%",height:h,background:isLast?C.accent:C.muted,borderRadius:"2px 2px 0 0"}}/>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:C.dim}}>
                      <span>{fmtDate(exData[0].date)}</span><span>{fmtDate(exData[exData.length-1].date)}</span>
                    </div>
                  </div>
                );
              })()}
              {selEx&&exData.length===0&&<div style={{fontSize:14,color:C.muted}}>No data logged yet</div>}
            </div>
          )
        )}

        {progTab==="run"&&(
          cardioDays.length===0?(
            <div style={{fontSize:14,color:C.muted}}>Add a cardio day to see running/cardio progress</div>
          ):(
            <div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
                {cardioDays.map(d=>(
                  <button key={d.id} onClick={()=>setSelCardio(selCardio===d.id?null:d.id)}
                    style={{background:selCardio===d.id?C.blue:C.card,color:selCardio===d.id?C.white:C.dim,border:`1px solid ${selCardio===d.id?C.blue:C.border}`,borderRadius:20,fontSize:12,padding:"5px 10px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
                    {d.name.length>20?d.name.slice(0,20)+"…":d.name}
                  </button>
                ))}
              </div>

              {selCardio&&cardioSessions.length===0&&<div style={{fontSize:14,color:C.muted}}>No sessions logged yet for this day</div>}

              {selCardio&&cardioSessions.length>0&&cardioHasPace&&cardioPaceData.length>0&&(()=>{
                const maxP=Math.max(...cardioPaceData.map(d=>d.paceVal));const minP=Math.min(...cardioPaceData.map(d=>d.paceVal));
                const latest=cardioPaceData[cardioPaceData.length-1];
                const distUnit=unit==="mi"?"mi":"km";
                return(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:28,fontWeight:700,color:C.ink,lineHeight:1}}>{latest.paceStr}</div>
                        <div style={{fontSize:12,color:C.dim,marginTop:2}}>latest pace · {latest.distance}{distUnit}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,background:"#f7ecd2",border:`1px solid ${C.warn}33`,borderRadius:5,padding:"7px 10px",marginBottom:12}}>
                      <span style={{fontSize:14}}>🏆</span>
                      <span style={{fontSize:12,color:C.mid}}>Fastest: <b style={{color:C.ink}}>{cardioPB.fastest.paceStr}</b> ({fmtDate(cardioPB.fastest.date)}) · Longest: <b style={{color:C.ink}}>{cardioPB.longest.distance}{distUnit}</b> ({fmtDate(cardioPB.longest.date)})</span>
                    </div>
                    <div style={{fontSize:11,color:C.dim,marginBottom:4}}>PACE TREND (taller = faster)</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                      {cardioPaceData.map((d,i)=>{
                        const h=maxP===minP?40:8+((maxP-d.paceVal)/(maxP-minP))*52;const isLast=i===cardioPaceData.length-1;
                        return(
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                            <div style={{width:"100%",height:h,background:isLast?C.blue:C.muted,borderRadius:"2px 2px 0 0"}}/>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:C.dim}}>
                      <span>{fmtDate(cardioPaceData[0].date)}</span><span>{fmtDate(cardioPaceData[cardioPaceData.length-1].date)}</span>
                    </div>
                  </div>
                );
              })()}

              {selCardio&&cardioSessions.length>0&&!cardioHasPace&&(
                <div>
                  <div style={{fontSize:12,color:C.dim,marginBottom:8}}>{cardioSessions.length} session{cardioSessions.length===1?"":"s"} logged — recent history:</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {cardioSessions.slice(-6).reverse().map((l,i)=>{
                      const parts=(cardioTmpl?.fields||[]).map(f=>{const v=l.data?.sets?.[f.id];return v?`${f.label}: ${v}`:null;}).filter(Boolean);
                      return(
                        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:C.dim,marginBottom:3}}>{fmtDate(l.date)}</div>
                          <div style={{fontSize:13,color:C.text}}>{parts.join(" · ")||"No details logged"}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )
        )}
      </div>

      <div style={{padding:"0 18px 32px"}}>
        <button onClick={()=>setShowBackup(o=>!o)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",border:"none",padding:"8px 0",cursor:"pointer"}}>
          <span style={{fontSize:12,color:C.dim,letterSpacing:"0.1em"}}>BACKUP & RESTORE</span>
          <span style={{color:C.muted,fontSize:16,transform:showBackup?"rotate(90deg)":"none",transition:"0.15s"}}>›</span>
        </button>
        {showBackup&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:14,marginTop:8}}>
            <div style={{fontSize:13,color:C.mid,marginBottom:12}}>Your data only lives on this device. Export a backup now and then so it's never at risk, or use it to move everything to a new phone.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={exportBackup} style={{flex:1,background:C.accent,border:"none",borderRadius:5,color:C.ink,fontSize:13,fontWeight:700,padding:11,cursor:"pointer"}}>⬇ Export backup</button>
              <button onClick={()=>fileInputRef.current?.click()} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:13,fontWeight:600,padding:11,cursor:"pointer"}}>⬆ Restore</button>
            </div>
            <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImportFile} style={{display:"none"}}/>
            {importMsg==="error"&&<div style={{marginTop:10,fontSize:12,color:C.red}}>That file couldn't be read — make sure it's a backup exported from this app.</div>}
            {pendingImport&&(
              <div style={{marginTop:12,background:"#f7ecd2",border:`1px solid ${C.warn}44`,borderRadius:5,padding:"11px 12px"}}>
                <div style={{fontSize:13,color:C.mid,marginBottom:9}}>This will replace all your current data with this backup{pendingImport._exportedAt?` (from ${fmtDate(pendingImport._exportedAt.slice(0,10))})`:""}. This can't be undone.</div>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={()=>setPendingImport(null)} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.dim,fontSize:13,padding:9,cursor:"pointer"}}>Cancel</button>
                  <button onClick={confirmImport} style={{flex:1,background:C.warn,border:"none",borderRadius:5,color:C.white,fontSize:13,fontWeight:700,padding:9,cursor:"pointer"}}>Restore</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
