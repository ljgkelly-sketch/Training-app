// ── Pace helpers ──────────────────────────────────────────────────────────────
function calcPaceStr(distStr, durMins, unit) {
  const dist = parseFloat(distStr), mins = parseFloat(durMins);
  if (!dist || !mins || dist <= 0 || mins <= 0) return "";
  const d = unit === "mi" ? dist * 0.621371 : dist;
  const p = mins / d;
  const m = Math.floor(p), s = Math.round((p - m) * 60);
  return m + ":" + s.toString().padStart(2,"0") + " / " + (unit==="mi"?"mi":"km");
}
function calcSpeedStr(distStr, durMins, unit) {
  const dist = parseFloat(distStr), mins = parseFloat(durMins);
  if (!dist || !mins || dist <= 0 || mins <= 0) return "";
  const d = unit === "mi" ? dist * 0.621371 : dist;
  return (d / (mins / 60)).toFixed(1) + " " + (unit==="mi"?"mph":"km/h");
}

function dateKey(d=new Date()){return d.toISOString().slice(0,10);}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function uid(){return Math.random().toString(36).slice(2,9);}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
async function searchFoods(query){
  const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=12&fields=product_name,brands,nutriments,serving_size`);
  const d=await r.json();
  return(d.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>{
    const n=p.nutriments;
    return{name:p.product_name+(p.brands?` (${p.brands.split(",")[0].trim()})`:``),
      protein100:parseFloat(n["proteins_100g"]||0),
      calories100:parseFloat(n["energy-kcal_100g"]||(n["energy_100g"]?n["energy_100g"]/4.184:0)),
      serving:parseFloat(p.serving_size)||100};
  }).filter(p=>p.calories100>0||p.protein100>0);
}

// ── Root ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("train");
  const [prog,setProg]=useState(()=>lsGet("prog")||DEFAULT_PROGRAMME);
  const [wlogs,setWL]=useState(()=>lsGet("wlogs")||{});
  const [flogs,setFL]=useState(()=>lsGet("flogs")||{});
  const [unit,setUnit]=useState(()=>lsGet("unit")||"km");

  function saveProg(p){setProg(p);lsSet("prog",p);}
  function toggleUnit(){const u=unit==="km"?"mi":"km";setUnit(u);lsSet("unit",u);}
  function saveWorkout(dayId,date,data){
    const k=`${dayId}__${date}`;const next={...wlogs,[k]:{dayId,date,data}};
    setWL(next);lsSet("wlogs",next);
  }
  function saveFood(date,meals){const next={...flogs,[date]:meals};setFL(next);lsSet("flogs",next);}

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'DM Mono','Courier New',monospace",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      <style>{CSS}</style>
      {tab==="train"&&<TrainTab prog={prog} saveProg={saveProg} wlogs={wlogs} saveWorkout={saveWorkout} unit={unit} toggleUnit={toggleUnit}/>}
      {tab==="food" &&<FoodTab  flogs={flogs} saveFood={saveFood}/>}
      {tab==="stats"&&<StatsTab wlogs={wlogs} flogs={flogs} prog={prog}/>}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["train","LIFT","⬡"],["food","EAT","◎"],["stats","STATS","◈"]].map(([id,label,icon])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",color:tab===id?C.accent:C.dim,padding:"10px 0 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color 0.15s"}}>
            <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
            <span style={{fontSize:9,letterSpacing:"0.12em"}}>{label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── TRAIN TAB ─────────────────────────────────────────────────────────────────
function TrainTab({prog,saveProg,wlogs,saveWorkout,unit,toggleUnit}){
  const [view,setView]=useState("home");
  const [dayIdx,setDayIdx]=useState(0);
  const [sData,setSData]=useState({});
  const [sDate,setSDate]=useState(dateKey());
  const [note,setNote]=useState("");
  const [saved,setSaved]=useState(false);
  const [showAddDay,setShowAddDay]=useState(false);

  function openDay(i){setDayIdx(i);setSData({});setNote("");setSaved(false);setSDate(dateKey());setView("session");}
  function openEdit(i){setDayIdx(i);setView("edit");}
  function setSet(exId,si,f,v){setSData(p=>{const s=[...(p[exId]?.sets||[])];s[si]={...(s[si]||{}),[f]:v};return{...p,[exId]:{sets:s}};});}
  function doSave(){saveWorkout(prog[dayIdx].id,sDate,{sets:sData,note});setSaved(true);}
  function deleteDay(i){
    if(!window.confirm("Delete this day?"))return;
    const next=prog.filter((_,idx)=>idx!==i);saveProg(next);
  }
  function addDay(newDay){saveProg([...prog,newDay]);setShowAddDay(false);}

  const day=prog[dayIdx];

  if(view==="edit") return <EditDay day={day} dayIdx={dayIdx} prog={prog} saveProg={saveProg} onBack={()=>setView("home")}/>;

  if(view==="session"){
    const isCardio=day.type===TYPE_CARDIO;
    const prev=Object.values(wlogs).filter(l=>l.dayId===day.id&&l.date!==sDate).sort((a,b)=>b.date.localeCompare(a.date))[0];
    return(
      <div className="fu">
        <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.dim,fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:isCardio?C.blue:C.accent,letterSpacing:"0.15em"}}>{day.tag} · {isCardio?`CARDIO · ${unit.toUpperCase()}`:"GYM"}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,lineHeight:1.1,marginTop:1}}>{day.name}</div>
          </div>
          <input type="date" value={sDate} onChange={e=>{setSDate(e.target.value);setSaved(false);}}
            style={{background:C.card,border:`1px solid ${C.border}`,color:C.mid,fontSize:10,borderRadius:6,padding:"5px 7px"}}/>
        </div>

        {/* Previous session summary */}
        {prev&&(
          <div style={{margin:"10px 18px 0",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px"}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:4}}>LAST — {fmtDate(prev.date)}</div>
            {isCardio?(
              <div style={{fontSize:10,color:C.mid}}>{prev.data?.note||"No notes recorded"}</div>
            ):(
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {day.exercises.map(ex=>{
                  const d=prev.data?.sets?.[ex.id];const ws=(d?.sets||[]).map(s=>parseFloat(s.w)).filter(Boolean);
                  if(!ws.length)return null;
                  return <div key={ex.id} style={{fontSize:9,background:C.surface,borderRadius:4,padding:"2px 7px",color:C.mid}}>{ex.name.split(" ")[0]} {Math.max(...ws)}kg</div>;
                })}
              </div>
            )}
          </div>
        )}

        <div style={{padding:"0 18px"}}>
          {isCardio?(
            <CardioLogger day={day} sData={sData} setSData={setSData} unit={unit}/>
          ):(
            day.exercises.map(ex=>(
              <ExLogger key={ex.id} ex={ex} data={sData[ex.id]} prev={prev?.data?.sets?.[ex.id]} setSet={(si,f,v)=>setSet(ex.id,si,f,v)}/>
            ))
          )}
          <div style={{marginTop:14}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:6}}>NOTES</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="How did it feel? Any PBs?"
              style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:11,padding:"10px 12px",resize:"none",outline:"none"}}/>
          </div>
          <button onClick={doSave} style={{width:"100%",marginTop:10,marginBottom:24,padding:14,background:saved?"#1a2a14":C.accent,color:saved?C.green:C.bg,border:"none",borderRadius:8,fontSize:11,fontWeight:500,letterSpacing:"0.1em",cursor:"pointer",transition:"all 0.2s"}}>
            {saved?"✓ SAVED":"SAVE SESSION"}
          </button>
        </div>
      </div>
    );
  }

  // Home
  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>PROGRAMME</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:"0.04em",color:C.white,lineHeight:1}}>Training</div>
            <div style={{fontSize:10,color:C.dim,marginTop:4}}>{Object.keys(wlogs).length} sessions logged</div>
          </div>
          <button onClick={toggleUnit} style={{marginTop:6,background:C.card,border:`1px solid ${C.border}`,borderRadius:7,color:C.accent,fontSize:11,fontWeight:500,padding:"7px 12px",cursor:"pointer",letterSpacing:"0.08em",transition:"all 0.15s"}}>
            {unit==="km"?"KM  →  MI":"MI  →  KM"}
          </button>
        </div>
      </div>

      <div style={{padding:"0 18px",display:"flex",flexDirection:"column",gap:8}}>
        {prog.map((d,i)=>{
          const isCardio=d.type===TYPE_CARDIO;
          const sessions=Object.values(wlogs).filter(l=>l.dayId===d.id);
          const last=sessions.sort((a,b)=>b.date.localeCompare(a.date))[0];
          const tagColor=isCardio?C.blue:C.accent;
          return(
            <div key={d.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",borderLeft:`3px solid ${tagColor}`}}>
              <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>openDay(i)}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                    <span style={{fontSize:9,color:tagColor,letterSpacing:"0.15em"}}>{d.tag}</span>
                    <span style={{fontSize:8,color:isCardio?C.blue:C.dim,background:isCardio?"#0a1a2e":"#1a1a1a",padding:"2px 6px",borderRadius:3,letterSpacing:"0.08em"}}>{isCardio?"CARDIO":"GYM"}</span>
                  </div>
                  <div style={{fontSize:14,color:C.white}}>{d.name}</div>
                  <div style={{fontSize:10,color:C.dim,marginTop:2}}>
                    {isCardio?(last?`Last: ${fmtDate(last.date)}`:"Not yet logged"):`${d.exercises.length} exercises${last?` · Last: ${fmtDate(last.date)}`:""}`}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>openEdit(i)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontSize:10,padding:"5px 9px",cursor:"pointer"}}>EDIT</button>
                  <button onClick={()=>deleteDay(i)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.red,fontSize:14,padding:"4px 8px",cursor:"pointer",lineHeight:1}}>×</button>
                  <span onClick={()=>openDay(i)} style={{color:C.muted,fontSize:22,cursor:"pointer"}}>›</span>
                </div>
              </div>
            </div>
          );
        })}

        {/* Add day button */}
        <button onClick={()=>setShowAddDay(true)}
          style={{padding:"13px",background:"none",border:`1px dashed ${C.border}`,borderRadius:10,color:C.dim,fontSize:11,cursor:"pointer",letterSpacing:"0.08em",marginTop:2}}>
          + ADD DAY
        </button>
      </div>

      {showAddDay&&<AddDayModal onAdd={addDay} onClose={()=>setShowAddDay(false)} dayCount={prog.length}/>}
    </div>
  );
}

// ── ADD DAY MODAL ─────────────────────────────────────────────────────────────
function AddDayModal({onAdd,onClose,dayCount}){
  const [type,setType]=useState(TYPE_GYM);
  const [name,setName]=useState("");
  const [cardioTemplate,setCardioTemplate]=useState(0);

  function confirm(){
    if(!name.trim())return;
    const tag=`DAY ${dayCount+1}`;
    if(type===TYPE_GYM){
      onAdd({id:uid(),tag,name:name.trim(),type:TYPE_GYM,exercises:[]});
    } else {
      const tmpl=CARDIO_TEMPLATES[cardioTemplate];
      onAdd({id:uid(),tag,name:name.trim(),type:TYPE_CARDIO,template:tmpl.name,fields:tmpl.fields});
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div className="su" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"20px 18px 40px",width:"100%",maxWidth:480,margin:"0 auto"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em",marginBottom:14}}>ADD NEW DAY</div>

        {/* Type selector */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[TYPE_GYM,TYPE_CARDIO].map(t=>(
            <button key={t} onClick={()=>setType(t)}
              style={{padding:"12px",background:type===t?(t===TYPE_CARDIO?"#0a1a2e":C.card):C.card,border:`1px solid ${type===t?(t===TYPE_CARDIO?C.blue:C.accent):C.border}`,borderRadius:8,color:type===t?(t===TYPE_CARDIO?C.blue:C.accent):C.dim,fontSize:11,cursor:"pointer",letterSpacing:"0.08em",transition:"all 0.15s"}}>
              {t===TYPE_GYM?"⬡ GYM":"◈ CARDIO"}
            </button>
          ))}
        </div>

        {/* Name */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:6}}>SESSION NAME</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder={type===TYPE_GYM?"e.g. Upper Body":"e.g. Easy Run"}
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,padding:"11px 12px",outline:"none"}}/>
        </div>

        {/* Cardio template picker */}
        {type===TYPE_CARDIO&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:8}}>SESSION TYPE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {CARDIO_TEMPLATES.map((t,i)=>(
                <button key={i} onClick={()=>setCardioTemplate(i)}
                  style={{background:cardioTemplate===i?C.blue:C.card,color:cardioTemplate===i?C.white:C.dim,border:`1px solid ${cardioTemplate===i?C.blue:C.border}`,borderRadius:6,fontSize:10,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                  {t.name}
                </button>
              ))}
            </div>
            <div style={{marginTop:10,fontSize:10,color:C.dim,background:C.card,borderRadius:7,padding:"8px 10px"}}>
              Fields: {CARDIO_TEMPLATES[cardioTemplate].fields.map(f=>f.label).join(", ")}
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontSize:11,padding:12,cursor:"pointer"}}>CANCEL</button>
          <button onClick={confirm} style={{flex:2,background:type===TYPE_CARDIO?C.blue:C.accent,border:"none",borderRadius:8,color:type===TYPE_CARDIO?C.white:C.bg,fontSize:11,fontWeight:500,padding:12,cursor:"pointer",letterSpacing:"0.08em"}}>
            ADD DAY
          </button>
        </div>
      </div>
    </div>
  );
}

// ── CARDIO LOGGER ─────────────────────────────────────────────────────────────
function CardioLogger({day,sData,setSData,unit}){
  const tmpl=CARDIO_TEMPLATES.find(t=>t.name===day.template)||CARDIO_TEMPLATES[6];
  const fields=day.fields||tmpl.fields;
  const hasPaceCalc=tmpl.calcPace;

  function upd(id,v){setSData(p=>({...p,[id]:v}));}

  const distance=sData["distance"]||"";
  const duration=sData["duration"]||"";
  const autoPace=hasPaceCalc?calcPaceStr(distance,duration,unit):"";
  const autoSpeed=hasPaceCalc?calcSpeedStr(distance,duration,unit):"";
  const distUnit=unit==="mi"?"miles":"km";

  return(
    <div style={{paddingTop:14}}>
      <div style={{fontSize:9,color:C.blue,letterSpacing:"0.12em",marginBottom:12}}>{day.template||"CARDIO SESSION"} · {unit==="mi"?"MILES":"KM"}</div>
      {fields.map(f=>{
        const isReadonlyPace=f.id==="pace"&&hasPaceCalc;
        const displayVal=isReadonlyPace?autoPace:(sData[f.id]||"");
        const lbl=f.id==="distance"?`Distance (${distUnit})`:f.label;
        return(
          <div key={f.id} style={{marginBottom:12}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>{lbl.toUpperCase()}</div>
            <input
              value={displayVal}
              onChange={isReadonlyPace?undefined:e=>upd(f.id,e.target.value)}
              readOnly={isReadonlyPace}
              placeholder={isReadonlyPace?(distance&&duration?"Calculating...":f.placeholder):f.placeholder}
              style={{width:"100%",background:isReadonlyPace?C.surface:C.card,
                border:`1px solid ${isReadonlyPace?(autoPace?C.accent+"55":C.border):(sData[f.id]?C.blue+"66":C.border)}`,
                borderRadius:8,color:isReadonlyPace?(autoPace?C.accent:C.dim):C.text,
                fontSize:13,padding:"10px 12px",outline:"none",transition:"border-color 0.15s",
                cursor:isReadonlyPace?"default":"text"}}/>
          </div>
        );
      })}
      {hasPaceCalc&&autoPace&&(
        <div style={{background:"#0d1a0d",border:`1px solid ${C.accent}33`,borderRadius:8,padding:"10px 14px",marginTop:4}}>
          <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:6}}>CALCULATED</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.accent,lineHeight:1}}>{autoPace}</div>
              <div style={{fontSize:9,color:C.dim,marginTop:2}}>avg pace</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.green,lineHeight:1}}>{autoSpeed}</div>
              <div style={{fontSize:9,color:C.dim,marginTop:2}}>avg speed</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── EDIT DAY ──────────────────────────────────────────────────────────────────
function EditDay({day,dayIdx,prog,saveProg,onBack}){
  const [draft,setDraft]=useState(JSON.parse(JSON.stringify(day)));
  const [newEx,setNewEx]=useState({name:"",sets:3,reps:"",note:""});
  const [addOpen,setAddOpen]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const isCardio=draft.type===TYPE_CARDIO;

  function upd(f,v){setDraft(p=>({...p,[f]:v}));}
  function updEx(i,f,v){const e=[...draft.exercises];e[i]={...e[i],[f]:f==="sets"?parseInt(v)||1:v};setDraft(p=>({...p,exercises:e}));}
  function removeEx(i){setDraft(p=>({...p,exercises:p.exercises.filter((_,idx)=>idx!==i)}));}
  function moveEx(i,dir){const e=[...draft.exercises];const t=i+dir;if(t<0||t>=e.length)return;[e[i],e[t]]=[e[t],e[i]];setDraft(p=>({...p,exercises:e}));}
  function addEx(){
    if(!newEx.name.trim())return;
    const e=[...draft.exercises,{id:uid(),name:newEx.name.trim(),sets:parseInt(newEx.sets)||3,reps:newEx.reps||"10",note:newEx.note}];
    setDraft(p=>({...p,exercises:e}));setNewEx({name:"",sets:3,reps:"",note:""});setAddOpen(false);
  }
  function changeTemplate(i){
    const tmpl=CARDIO_TEMPLATES[i];
    setDraft(p=>({...p,template:tmpl.name,fields:tmpl.fields}));
  }
  function save(){const next=[...prog];next[dayIdx]=draft;saveProg(next);onBack();}
  function resetAll(){saveProg(DEFAULT_PROGRAMME);onBack();}

  const inp=(val,onChange,placeholder,type="text",extra={})=>(
    <input type={type} value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,padding:"8px 10px",outline:"none",width:"100%",...extra}}/>
  );

  return(
    <div className="fu">
      <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.dim,fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>‹</button>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:C.warn,letterSpacing:"0.15em"}}>EDITING · {isCardio?"CARDIO":"GYM"}</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,lineHeight:1.1}}>{draft.name}</div>
        </div>
        <button onClick={save} style={{background:C.accent,border:"none",borderRadius:7,color:C.bg,fontSize:10,fontWeight:500,padding:"8px 14px",cursor:"pointer",letterSpacing:"0.08em"}}>SAVE</button>
      </div>

      <div style={{padding:"14px 18px"}}>
        {/* Name + tag */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8,marginBottom:16}}>
          <div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>NAME</div>
            {inp(draft.name,v=>upd("name",v),"Session name")}
          </div>
          <div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>TAG</div>
            {inp(draft.tag,v=>upd("tag",v),"DAY 1")}
          </div>
        </div>

        {/* Cardio template change */}
        {isCardio&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:8}}>SESSION TYPE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {CARDIO_TEMPLATES.map((t,i)=>{
                const active=draft.template===t.name;
                return(
                  <button key={i} onClick={()=>changeTemplate(i)}
                    style={{background:active?C.blue:C.card,color:active?C.white:C.dim,border:`1px solid ${active?C.blue:C.border}`,borderRadius:6,fontSize:10,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                    {t.name}
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:8,fontSize:10,color:C.dim}}>Fields: {(draft.fields||[]).map(f=>f.label).join(", ")}</div>
          </div>
        )}

        {/* Gym exercises */}
        {!isCardio&&(
          <>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:8}}>EXERCISES</div>
            {draft.exercises.map((ex,i)=>(
              <div key={ex.id||i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px",marginBottom:8}}>

                  <div style={{display:"flex",flexDirection:"column",gap:2}}>

                    <button onClick={()=>moveEx(i,1)} disabled={i===draft.exercises.length-1}
                      style={{background:"none",border:"none",color:i===draft.exercises.length-1?C.muted:C.dim,fontSize:14,cursor:i===draft.exercises.length-1?"default":"pointer",lineHeight:1,padding:"1px 4px"}}>▼</button>
                  </div>
                  <div style={{flex:1}}>{inp(ex.name,v=>updEx(i,"name",v),"Exercise name")}</div>
                  <button onClick={()=>removeEx(i)} style={{background:"none",border:"none",color:C.red,fontSize:20,cursor:"pointer",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:6}}>
                  <div>
                    <div style={{fontSize:8,color:C.dim,marginBottom:4}}>SETS</div>

                  </div>
                  <div>
                    <div style={{fontSize:8,color:C.dim,marginBottom:4}}>REPS</div>
                    <input type="text" value={ex.reps} onChange={e=>updEx(i,"reps",e.target.value)} placeholder="e.g. 8–10"

                  </div>
                  <div>
                    <div style={{fontSize:8,color:C.dim,marginBottom:4}}>NOTE</div>
                    <input type="text" value={ex.note} onChange={e=>updEx(i,"note",e.target.value)} placeholder="Optional"
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:11,padding:"7px 8px",outline:"none",width:"100%"}}/>
                  </div>
                </div>
              </div>
            ))}
            {!addOpen?(
              <button onClick={()=>setAddOpen(true)}

              </button>
            ):(
              <div className="su" style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:8,padding:12,marginTop:2}}>
                <div style={{fontSize:9,color:C.accent,letterSpacing:"0.1em",marginBottom:10}}>NEW EXERCISE</div>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  <input type="text" value={newEx.name} onChange={e=>setNewEx(p=>({...p,name:e.target.value}))} placeholder="Exercise name"

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    <div>
                      <div style={{fontSize:8,color:C.dim,marginBottom:4}}>SETS</div>
                      <input type="number" value={newEx.sets} onChange={e=>setNewEx(p=>({...p,sets:e.target.value}))} min={1}
                        style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:13,padding:"8px",outline:"none",width:"100%",textAlign:"center"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:8,color:C.dim,marginBottom:4}}>REPS</div>
                      <input type="text" value={newEx.reps} onChange={e=>setNewEx(p=>({...p,reps:e.target.value}))} placeholder="e.g. 10–12"
                        style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:13,padding:"8px",outline:"none",width:"100%",textAlign:"center"}}/>
                    </div>
                  </div>
                  <input type="text" value={newEx.note} onChange={e=>setNewEx(p=>({...p,note:e.target.value}))} placeholder="Note (optional)"
                    style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:11,padding:"8px 10px",outline:"none"}}/>
                  <div style={{display:"flex",gap:7}}>
                    <button onClick={()=>setAddOpen(false)}
                      style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.dim,fontSize:11,padding:"10px",cursor:"pointer"}}>CANCEL</button>
                    <button onClick={addEx}
                      style={{flex:2,background:C.accent,border:"none",borderRadius:7,color:C.bg,fontSize:11,fontWeight:500,padding:"10px",cursor:"pointer",letterSpacing:"0.08em"}}>ADD</button>
                  </div>

              </div>

        )}

        {/* Reset */}
        <div style={{marginTop:24,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          {!confirmReset?(
            <button onClick={()=>setConfirmReset(true)}
              style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.dim,fontSize:10,padding:"9px 14px",cursor:"pointer",letterSpacing:"0.08em"}}>

          ):(
            <div style={{background:"#1a0a0a",border:`1px solid ${C.red}44`,borderRadius:8,padding:"12px 14px"}}>

  );

        <span style={{color:C.muted,fontSize:13,transform:open?"rotate(90deg)":"none",transition:"0.15s"}}>›</span>
      </div>
      {open&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 1fr 1fr",gap:4,marginBottom:4}}>
            {["","KG","REPS","RPE","PREV"].map((h,i)=>(
              <div key={i} style={{fontSize:8,color:C.muted,letterSpacing:"0.08em",textAlign:"center"}}>{h}</div>
            ))}
          </div>
          {Array.from({length:ex.sets}).map((_,si)=>{
            const ps=prev?.sets?.[si];const filled=sets[si]?.w;
            return(
              <div key={si} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 1fr 1fr",gap:4,marginBottom:4,alignItems:"center"}}>
                <div style={{fontSize:9,color:C.muted,textAlign:"center"}}>{si+1}</div>
                {["w","r","rpe"].map(f=>(
                  <input key={f} type={f==="rpe"?"text":"number"} value={sets[si]?.[f]||""} placeholder="—"
                    onChange={e=>setSet(si,f,e.target.value)}
                    style={{background:C.surface,border:"1px solid",borderColor:filled?C.accent+"44":C.border,borderRadius:6,color:C.text,fontSize:13,padding:"8px 4px",textAlign:"center",outline:"none",width:"100%"}}/>
                ))}
                <div style={{fontSize:10,color:C.dim,textAlign:"center"}}>{ps?.w?`${ps.w}kg`:"—"}</div>
              </div>

      )}

  );
}

// ── FOOD TAB ─────────────────────────────────────────────────────────────────
function FoodTab({flogs,saveFood}){
  const today=dateKey();
  const [date,setDate]=useState(today);
  const [meals,setMeals]=useState(flogs[today]||[]);
  const [mode,setMode]=useState("search");
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [searching,setSrch]=useState(false);
  const [noRes,setNoRes]=useState(false);
  const [pending,setPending]=useState(null);
  const [grams,setGrams]=useState("");
  const [custom,setCustom]=useState({name:"",protein:"",calories:""});
  const timer=useRef(null);

  useEffect(()=>{setMeals(flogs[date]||[]);},[date,flogs]);
  useEffect(()=>{
    if(mode!=="search")return;
    if(!query.trim()){setResults([]);setNoRes(false);return;}
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      setSrch(true);setNoRes(false);
      try{const r=await searchFoods(query);setResults(r);setNoRes(r.length===0);}
      catch{setNoRes(true);}
      setSrch(false);
    },700);
    return()=>clearTimeout(timer.current);
  },[query,mode]);

  function addMeal(item){const next=[...meals,{...item,id:Date.now()}];setMeals(next);saveFood(date,next);}
  function removeMeal(id){const next=meals.filter(m=>m.id!==id);setMeals(next);saveFood(date,next);}
  function selectResult(f){setPending(f);setGrams(String(Math.round(f.serving)||100));}
  function confirmAdd(){
    const g=parseFloat(grams)||100;
    addMeal({name:`${pending.name} (${g}g)`,protein:Math.round(pending.protein100*g/100),calories:Math.round(pending.calories100*g/100)});
    setPending(null);setGrams("");setQuery("");setResults([]);
  }
  function addCustom(){
    if(!custom.name||!custom.protein)return;
    addMeal({name:custom.name,protein:parseFloat(custom.protein)||0,calories:parseFloat(custom.calories)||0});
    setCustom({name:"",protein:"",calories:""});
  }

  const totalP=meals.reduce((s,m)=>s+(m.protein||0),0);
  const totalC=meals.reduce((s,m)=>s+(m.calories||0),0);
  const pPct=Math.min(100,(totalP/PROTEIN_TARGET)*100);
  const cPct=Math.min(100,(totalC/CALORIE_TARGET)*100);

  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>DAILY TRACKER</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.white,lineHeight:1}}>Nutrition</div>
          </div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:C.card,border:`1px solid ${C.border}`,color:C.mid,fontSize:10,borderRadius:6,padding:"5px 7px",marginBottom:4}}/>
        </div>
        <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"PROTEIN",val:Math.round(totalP),target:PROTEIN_TARGET,unit:"g",pct:pPct,color:C.accent},
            {label:"CALORIES",val:Math.round(totalC),target:CALORIE_TARGET,unit:"kcal",pct:cPct,color:C.warn}].map(({label,val,target,unit,pct,color})=>(
            <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:7}}>
                <span style={{fontFamily:"'Bebas Neue'",fontSize:28,color:pct>=100?color:C.white,lineHeight:1}}>{val}</span>
                <span style={{fontSize:9,color:C.dim}}>/ {target}{unit}</span>
              </div>
              <div style={{height:3,background:C.muted,borderRadius:2}}>
                <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:9,color:pct>=100?color:C.dim,marginTop:4}}>{pct>=100?"✓ TARGET HIT":`${target-val}${unit} to go`}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>LOGGED</div>
        {meals.length===0&&<div style={{fontSize:11,color:C.muted,paddingBottom:8}}>Nothing logged yet</div>}
        {meals.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:C.text}}>{m.name}</div>
              <div style={{fontSize:10,color:C.dim,marginTop:1}}>{m.protein}g protein · {m.calories} kcal</div>
            </div>
            <button onClick={()=>removeMeal(m.id)} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
          </div>
        ))}
      </div>

      <div style={{padding:"14px 18px"}}>
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["search","SEARCH"],["quick","QUICK ADD"],["custom","CUSTOM"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setPending(null);setQuery("");setResults([]);}}
              style={{flex:1,background:mode===m?C.accent:C.card,color:mode===m?C.bg:C.dim,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,fontSize:9,padding:"7px 3px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
              {l}
            </button>
          ))}
        </div>

        {mode==="search"&&!pending&&(
          <div>
            <div style={{position:"relative",marginBottom:9}}>
              <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search any food or brand…"
                style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12,padding:"11px 12px 11px 34px",outline:"none"}}/>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.dim}}>⌕</span>
              {searching&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:14,height:14,border:`2px solid ${C.muted}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>}
            </div>
            {noRes&&<div style={{fontSize:11,color:C.muted,marginBottom:8}}>No results — try different terms or use Custom</div>}
            {!query&&<div style={{fontSize:10,color:C.dim}}>Type to search millions of foods</div>}
            <div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
              {results.map((f,i)=>(
                <button key={i} onClick={()=>selectResult(f)}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",textAlign:"left",cursor:"pointer"}}>
                  <div style={{fontSize:12,color:C.text,marginBottom:2}}>{f.name.length>42?f.name.slice(0,42)+"…":f.name}</div>
                  <div style={{fontSize:10,color:C.dim}}>per 100g: {Math.round(f.protein100)}g protein · {Math.round(f.calories100)} kcal</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {mode==="search"&&pending&&(
          <div className="fu" style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:10,padding:14}}>
            <div style={{fontSize:12,color:C.text,marginBottom:3}}>{pending.name.length>42?pending.name.slice(0,42)+"…":pending.name}</div>
            <div style={{fontSize:10,color:C.dim,marginBottom:12}}>per 100g: {Math.round(pending.protein100)}g protein · {Math.round(pending.calories100)} kcal</div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>HOW MUCH?</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {[50,75,100,150,200,250].map(g=>(
                <button key={g} onClick={()=>setGrams(String(g))}
                  style={{background:grams===String(g)?C.accent:C.surface,color:grams===String(g)?C.bg:C.dim,border:`1px solid ${grams===String(g)?C.accent:C.border}`,borderRadius:6,fontSize:11,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                  {g}g
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
              <input type="number" value={grams} onChange={e=>setGrams(e.target.value)} placeholder="grams"
                style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:15,padding:"9px 12px",outline:"none",textAlign:"center"}}/>
              <span style={{fontSize:11,color:C.dim}}>g</span>
            </div>
            {grams&&<div style={{fontSize:11,color:C.mid,marginBottom:12,textAlign:"center"}}>= {Math.round(pending.protein100*parseFloat(grams||0)/100)}g protein · {Math.round(pending.calories100*parseFloat(grams||0)/100)} kcal</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setPending(null);setGrams("");}} style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontSize:11,padding:11,cursor:"pointer"}}>BACK</button>
              <button onClick={confirmAdd} style={{flex:2,background:C.accent,border:"none",borderRadius:8,color:C.bg,fontSize:11,fontWeight:500,padding:11,cursor:"pointer",letterSpacing:"0.08em"}}>ADD TO LOG</button>
            </div>
          </div>
        )}

        {mode==="quick"&&(
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {QUICK_PRESETS.map(f=>(
              <button key={f.name} onClick={()=>addMeal({...f,id:Date.now()})}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:C.text}}>{f.name}</span>
                <span style={{fontSize:10,color:C.dim}}>{f.protein}g · {f.calories}kcal</span>
              </button>
            ))}
          </div>
        )}

        {mode==="custom"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Enter macros manually for home-cooked meals</div>
            {[["name","Food name","text"],["protein","Protein (g)","number"],["calories","Calories (kcal)","number"]].map(([k,ph,t])=>(
              <input key={k} type={t} value={custom[k]} onChange={e=>setCustom(p=>({...p,[k]:e.target.value}))} placeholder={ph}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12,padding:"11px 12px",outline:"none"}}/>
            ))}
            <button onClick={addCustom} style={{background:C.accent,color:C.bg,border:"none",borderRadius:8,padding:12,fontSize:11,fontWeight:500,letterSpacing:"0.1em",cursor:"pointer"}}>ADD FOOD</button>
          </div>
        )}
      </div>
      <div style={{height:16}}/>
    </div>
  );
}

// ── STATS TAB ─────────────────────────────────────────────────────────────────
function StatsTab({wlogs,flogs,prog}){
  const [selEx,setSelEx]=useState(null);
  const allEx=(()=>{
    const seen={};
    Object.values(wlogs).forEach(l=>{
      Object.keys(l.data?.sets||{}).forEach(exId=>{
        if(!seen[exId])prog.forEach(d=>d.exercises?.forEach(e=>{if(e.id===exId)seen[exId]=e.name;}));
      });
    });
    return Object.entries(seen).map(([id,name])=>({id,name}));
  })();
  const exData=selEx?Object.values(wlogs).map(l=>{
    const d=l.data?.sets?.[selEx];if(!d?.sets)return null;
    const ws=d.sets.map(s=>parseFloat(s.w)).filter(Boolean);
    return ws.length?{date:l.date,max:Math.max(...ws)}:null;
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date)):[];

  const last7=Array.from({length:7}).map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const k=dateKey(d);const meals=flogs[k]||[];
    return{date:k,label:d.toLocaleDateString("en-GB",{weekday:"short"}),protein:meals.reduce((s,m)=>s+m.protein,0)};
  });
  const maxBar=Math.max(...last7.map(d=>d.protein),PROTEIN_TARGET);

  // cardio session count
  const cardioCount=Object.values(wlogs).filter(l=>{const d=prog.find(p=>p.id===l.dayId);return d?.type===TYPE_CARDIO;}).length;
  const gymCount=Object.keys(wlogs).length-cardioCount;

  return(
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>OVERVIEW</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.white,lineHeight:1}}>Stats</div>
      </div>
      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:12}}>PROTEIN — LAST 7 DAYS</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90,position:"relative"}}>
          <div style={{position:"absolute",left:0,right:0,bottom:`${(PROTEIN_TARGET/maxBar)*86}px`,borderTop:`1px dashed ${C.accent}44`,pointerEvents:"none"}}>
            <span style={{fontSize:8,color:C.accent+"88",position:"absolute",right:0,top:-10}}>{PROTEIN_TARGET}g</span>
          </div>
          {last7.map(d=>{
            const h=maxBar>0?(d.protein/maxBar)*80:0;const hit=d.protein>=PROTEIN_TARGET;
            return(
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end"}}>
                {d.protein>0&&<div style={{fontSize:8,color:hit?C.accent:C.mid}}>{d.protein}g</div>}
                <div style={{width:"100%",height:Math.max(3,h),background:hit?C.accent:C.muted,borderRadius:"3px 3px 0 0",transition:"height 0.4s"}}/>
                <div style={{fontSize:8,color:C.dim}}>{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>SESSIONS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[{label:"Gym sessions",val:gymCount,color:C.accent},{label:"Cardio sessions",val:cardioCount,color:C.blue},{label:"Days trained",val:new Set(Object.values(wlogs).map(l=>l.date)).size,color:C.white}].map(({label,val,color})=>(
            <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 10px"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:28,color,lineHeight:1}}>{val}</div>
              <div style={{fontSize:8,color:C.dim,marginTop:3}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 18px 24px"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>LIFT PROGRESS</div>
        {allEx.length===0?(
          <div style={{fontSize:11,color:C.muted}}>Log gym sessions to see lift progress</div>
        ):(
          <div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
              {allEx.map(e=>(
                <button key={e.id} onClick={()=>setSelEx(selEx===e.id?null:e.id)}
                  style={{background:selEx===e.id?C.accent:C.card,color:selEx===e.id?C.bg:C.dim,border:`1px solid ${selEx===e.id?C.accent:C.border}`,borderRadius:20,fontSize:9,padding:"5px 10px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
                  {e.name.length>20?e.name.slice(0,20)+"…":e.name}
                </button>
              ))}
            </div>
            {selEx&&exData.length>0&&(()=>{
              const maxW=Math.max(...exData.map(d=>d.max));const minW=Math.min(...exData.map(d=>d.max));
              const diff=exData[exData.length-1].max-exData[0].max;
              return(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                    <div>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:C.white,lineHeight:1}}>{exData[exData.length-1].max}kg</div>
                      <div style={{fontSize:9,color:C.dim,marginTop:2}}>latest top set</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:diff>=0?C.green:C.red,lineHeight:1}}>{diff>=0?"+":""}{diff.toFixed(1)}kg</div>
                      <div style={{fontSize:9,color:C.dim,marginTop:2}}>vs first session</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                    {exData.map((d,i)=>{
                      const h=maxW===minW?40:8+((d.max-minW)/(maxW-minW))*52;const isLast=i===exData.length-1;
                      return(
                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          {isLast&&<div style={{fontSize:8,color:C.accent}}>{d.max}kg</div>}
                          <div style={{width:"100%",height:h,background:isLast?C.accent:C.muted,borderRadius:"2px 2px 0 0"}}/>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:8,color:C.dim}}>
                    <span>{fmtDate(exData[0].date)}</span><span>{fmtDate(exData[exData.length-1].date)}</span>
                  </div>
                </div>
              );
            })()}
            {selEx&&exData.length===0&&<div style={{fontSize:11,color:C.muted}}>No weight data logged yet</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
