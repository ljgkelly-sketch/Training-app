<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Colours ──────────────────────────────────────────────────────────────────
const C = {

  muted:"#35353c", dim:"#5a5a66", mid:"#888898", text:"#e8e8f0",
  white:"#ffffff", accent:"#c8f135", warn:"#f1a435", red:"#e05555", green:"#4ecb71",

// ── Programme ─────────────────────────────────────────────────────────────────
const PROGRAMME = [
  { id:"chest", tag:"DAY 1", name:"Chest & Triceps", exercises:[
    { id:"bench",     name:"Barbell Bench Press",       sets:4, reps:"6–8",   note:"Heavy, add weight weekly" },
    { id:"inclinedb", name:"Incline DB Bench (45°)",    sets:4, reps:"8–10",  note:"Upper chest priority" },
    { id:"cablefly",  name:"Cable Chest Fly",           sets:3, reps:"12–15", note:"Stretch at bottom, squeeze at top" },
    { id:"dips",      name:"Dips (weighted)",           sets:3, reps:"8–10",  note:"Lean forward slightly for chest" },
    { id:"skull",     name:"Skull Crushers",            sets:3, reps:"10–12", note:"" },
    { id:"pushdown",  name:"Tricep Cable Pushdown",     sets:3, reps:"12–15", note:"Superset with skull crushers" },
  ]},
  { id:"back", tag:"DAY 2", name:"Back & Biceps", exercises:[
    { id:"wpullup",  name:"Weighted Pull-ups",          sets:4, reps:"6–8",   note:"Add weight when bodyweight easy" },
    { id:"bbrow",    name:"Barbell Row",                sets:4, reps:"8",     note:"Heavy, drive elbows back" },
    { id:"sarow",    name:"Single Arm DB Row",          sets:3, reps:"10 ea", note:"Full stretch at bottom" },
    { id:"cablerow", name:"Cable Row (close grip)",     sets:3, reps:"10–12", note:"Squeeze hard at end range" },
    { id:"facepull", name:"Face Pulls",                 sets:3, reps:"15",    note:"Rear delts — don't skip" },
    { id:"bbcurl",   name:"Barbell Curl",               sets:3, reps:"10",    note:"" },
    { id:"hammer",   name:"Hammer Curl",                sets:3, reps:"12",    note:"Superset with barbell curl" },
  ]},
  { id:"legs", tag:"DAY 3", name:"Legs (Knee-Friendly)", exercises:[
    { id:"slegext",   name:"Single Leg Extension",      sets:4, reps:"12 ea", note:"Slow eccentric, squeeze at top" },
    { id:"hamcurl",   name:"Prone Hamstring Curl",      sets:4, reps:"10–12", note:"3-sec eccentric" },
    { id:"rdl",       name:"Romanian Deadlift (DB)",    sets:3, reps:"10",    note:"Light-moderate, hinge well" },
    { id:"calfraise", name:"Standing Calf Raise",       sets:4, reps:"15–20", note:"Pause at top and bottom" },
    { id:"deadbug",   name:"Dead Bug",                  sets:3, reps:"10 ea", note:"" },
    { id:"pallof",    name:"Pallof Press",              sets:3, reps:"10 ea", note:"" },
  ]},
  { id:"shoulders", tag:"DAY 4", name:"Shoulders & Arms", exercises:[
    { id:"dbpress",  name:"Seated DB Shoulder Press",   sets:4, reps:"8–10",  note:"" },
    { id:"lateral",  name:"Lateral Raise",              sets:4, reps:"12–15", note:"Light, slow, controlled burn" },
    { id:"reardelt", name:"Rear Delt Fly (bent over)",  sets:3, reps:"12–15", note:"" },
    { id:"shrug",    name:"DB Shrug",                   sets:3, reps:"12",    note:"" },
    { id:"inclcurl", name:"Incline DB Curl",            sets:3, reps:"10–12", note:"Long head stretch" },
    { id:"concurl",  name:"Concentration Curl",         sets:3, reps:"12",    note:"" },
    { id:"ohtri",    name:"Overhead Tricep Extension",  sets:3, reps:"10–12", note:"" },
  ]},
];

const PROTEIN_TARGET = 165;
const CALORIE_TARGET = 2500;

const QUICK_PRESETS = [
  { name:"Boiled egg",            protein:6,  calories:70  },
  { name:"Protein shake",         protein:25, calories:130 },
  { name:"Skyr (250g)",           protein:22, calories:150 },
  { name:"Chicken breast (150g)", protein:38, calories:165 },
  { name:"Tuna tin",              protein:30, calories:140 },
  { name:"Greek yoghurt (200g)",  protein:20, calories:120 },
  { name:"Rice (100g dry)",       protein:7,  calories:360 },
  { name:"Pasta (100g dry)",      protein:13, calories:370 },
  { name:"Salmon (150g)",         protein:30, calories:225 },
  { name:"Beef mince (150g)",     protein:32, calories:270 },
  { name:"2 slices wholegrain",   protein:8,  calories:180 },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function dateKey(d = new Date()) { return d.toISOString().slice(0,10); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }

function lsGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

async function searchFoods(query) {
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=12&fields=product_name,brands,nutriments,serving_size`;
  const r = await fetch(url);
  const d = await r.json();
  return (d.products || [])
    .filter(p => p.product_name && p.nutriments)
    .map(p => {
      const n = p.nutriments;
      const protein100  = parseFloat(n["proteins_100g"] || 0);
      const kcal100     = parseFloat(n["energy-kcal_100g"] || (n["energy_100g"] ? n["energy_100g"]/4.184 : 0));
      return {
        name: p.product_name + (p.brands ? ` (${p.brands.split(",")[0].trim()})` : ""),
        protein100, calories100: kcal100,
        serving: parseFloat(p.serving_size) || 100,
      };
    })
    .filter(p => p.calories100 > 0 || p.protein100 > 0);
}

// ── CSS injected once ─────────────────────────────────────────────────────────
const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
input,textarea,button{font-family:'DM Mono','Courier New',monospace;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.2s ease;}
`;

// ── Root ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState("train");
  const [workoutLogs, setWL]    = useState(() => lsGet("wlogs") || {});
  const [foodLogs, setFL]       = useState(() => lsGet("flogs") || {});

  function saveWorkout(dayId, date, data) {
    const key = `${dayId}__${date}`;
    const next = { ...workoutLogs, [key]: { dayId, date, data } };
    setWL(next); lsSet("wlogs", next);
  }
  function saveFood(date, meals) {
    const next = { ...foodLogs, [date]: meals };
    setFL(next); lsSet("flogs", next);
  }

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'DM Mono','Courier New',monospace",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      <style>{GLOBAL_CSS}</style>
      {tab==="train" && <TrainTab workoutLogs={workoutLogs} saveWorkout={saveWorkout}/>}
      {tab==="food"  && <FoodTab  foodLogs={foodLogs}       saveFood={saveFood}/>}
      {tab==="stats" && <StatsTab workoutLogs={workoutLogs} foodLogs={foodLogs}/>}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["train","LIFT","⬡"],["food","EAT","◎"],["stats","STATS","◈"]].map(([id,label,icon])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",color:tab===id?C.accent:C.dim,padding:"10px 0 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color 0.15s"}}>
            <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
            <span style={{fontSize:9,letterSpacing:"0.12em"}}>{label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── TRAIN TAB ─────────────────────────────────────────────────────────────────
function TrainTab({ workoutLogs, saveWorkout }) {
  const [view, setView]       = useState("home");
  const [dayIdx, setDayIdx]   = useState(0);
  const [sData, setSData]     = useState({});
  const [sDate, setSDate]     = useState(dateKey());
  const [note, setNote]       = useState("");
  const [saved, setSaved]     = useState(false);

  function openDay(i) {
    setDayIdx(i); setSData({}); setNote(""); setSaved(false);
    setSDate(dateKey()); setView("session");
  }
  function setSet(exId, si, field, val) {
    setSData(p => {
      const sets = [...(p[exId]?.sets || [])];
      sets[si] = {...(sets[si]||{}), [field]:val};
      return {...p, [exId]:{sets}};
    });
  }
  function doSave() {
    saveWorkout(PROGRAMME[dayIdx].id, sDate, {sets:sData, note});
    setSaved(true);
  }

  const day = PROGRAMME[dayIdx];

  if (view === "session") {
    const prev = Object.values(workoutLogs)
      .filter(l=>l.dayId===day.id && l.date!==sDate)
      .sort((a,b)=>b.date.localeCompare(a.date))[0];
    return (
      <div className="fu">
        <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.dim,fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:C.accent,letterSpacing:"0.15em"}}>{day.tag}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,lineHeight:1.1,marginTop:1}}>{day.name}</div>
          </div>
          <input type="date" value={sDate} onChange={e=>{setSDate(e.target.value);setSaved(false);}}
            style={{background:C.card,border:`1px solid ${C.border}`,color:C.mid,fontSize:10,borderRadius:6,padding:"5px 7px"}}/>
        </div>

        {prev && (
          <div style={{margin:"10px 18px 0",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px"}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>LAST — {fmtDate(prev.date)}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {day.exercises.map(ex=>{
                const d=prev.data?.sets?.[ex.id];
                const ws=(d?.sets||[]).map(s=>parseFloat(s.w)).filter(Boolean);
                if(!ws.length) return null;
                return <div key={ex.id} style={{fontSize:9,background:C.surface,borderRadius:4,padding:"2px 7px",color:C.mid}}>{ex.name.split(" ")[0]} {Math.max(...ws)}kg</div>;
              })}
            </div>
          </div>
        )}

        <div style={{padding:"0 18px"}}>
          {day.exercises.map(ex=>(
            <ExLogger key={ex.id} ex={ex} data={sData[ex.id]}
              prev={prev?.data?.sets?.[ex.id]}
              setSet={(si,f,v)=>setSet(ex.id,si,f,v)}/>
          ))}
          <div style={{marginTop:14}}>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:6}}>NOTES</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="How did it feel? PRs?"
              style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:11,padding:"10px 12px",resize:"none",outline:"none"}}/>
          </div>
          <button onClick={doSave} style={{width:"100%",marginTop:10,marginBottom:24,padding:14,background:saved?"#1a2a14":C.accent,color:saved?C.green:C.bg,border:"none",borderRadius:8,fontSize:11,fontWeight:500,letterSpacing:"0.1em",cursor:"pointer",transition:"all 0.2s"}}>
            {saved?"✓ SAVED":"SAVE SESSION"}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="fu">
      <div style={{padding:"26px 18px 14px"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>4-WEEK PROGRAMME</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:"0.04em",color:C.white,lineHeight:1}}>Training</div>
        <div style={{fontSize:10,color:C.dim,marginTop:4}}>{Object.keys(workoutLogs).length} sessions logged</div>
      </div>
      <div style={{padding:"0 18px",display:"flex",flexDirection:"column",gap:8}}>
        {PROGRAMME.map((d,i)=>{
          const sessions=Object.values(workoutLogs).filter(l=>l.dayId===d.id);
          const last=sessions.sort((a,b)=>b.date.localeCompare(a.date))[0];
          return (
            <button key={d.id} onClick={()=>openDay(i)}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}
              onTouchStart={e=>e.currentTarget.style.borderColor=C.accent}
              onTouchEnd={e=>e.currentTarget.style.borderColor=C.border}>
              <div>
                <div style={{fontSize:9,color:C.accent,letterSpacing:"0.15em",marginBottom:3}}>{d.tag}</div>
                <div style={{fontSize:14,color:C.white}}>{d.name}</div>
                <div style={{fontSize:10,color:C.dim,marginTop:3}}>{d.exercises.length} exercises{last?` · Last: ${fmtDate(last.date)}`:""}</div>
              </div>
              <span style={{color:C.muted,fontSize:22}}>›</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function ExLogger({ ex, data, prev, setSet }) {
  const [open, setOpen] = useState(true);
  const sets = data?.sets || [];
  return (
    <div style={{borderBottom:`1px solid ${C.border}`,paddingTop:13,paddingBottom:4}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:open?8:0}}>
        <div>
          <div style={{fontSize:12,color:C.text}}>{ex.name}</div>
          <div style={{fontSize:9,color:C.dim,marginTop:2}}>{ex.sets} sets · {ex.reps}{ex.note?` · ${ex.note}`:""}</div>
        </div>
        <span style={{color:C.muted,fontSize:13,transform:open?"rotate(90deg)":"none",transition:"0.15s"}}>›</span>
      </div>
      {open && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 1fr 1fr",gap:4,marginBottom:4}}>
            {["","KG","REPS","RPE","PREV"].map((h,i)=>(
              <div key={i} style={{fontSize:8,color:C.muted,letterSpacing:"0.08em",textAlign:"center"}}>{h}</div>
            ))}
          </div>
          {Array.from({length:ex.sets}).map((_,si)=>{
            const prevSet=prev?.sets?.[si];
            const filled=sets[si]?.w;
            return (
              <div key={si} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 1fr 1fr",gap:4,marginBottom:4,alignItems:"center"}}>
                <div style={{fontSize:9,color:C.muted,textAlign:"center"}}>{si+1}</div>
                {["w","r","rpe"].map(f=>(
                  <input key={f} type={f==="rpe"?"text":"number"} value={sets[si]?.[f]||""} placeholder="—"
                    onChange={e=>setSet(si,f,e.target.value)}
                    style={{background:C.surface,border:"1px solid",borderColor:filled?C.accent+"44":C.border,borderRadius:6,color:C.text,fontSize:13,padding:"8px 4px",textAlign:"center",outline:"none",width:"100%"}}/>
                ))}
                <div style={{fontSize:10,color:C.dim,textAlign:"center"}}>{prevSet?.w?`${prevSet.w}kg`:"—"}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── FOOD TAB ─────────────────────────────────────────────────────────────────
function FoodTab({ foodLogs, saveFood }) {
  const today = dateKey();
  const [date, setDate]       = useState(today);
  const [meals, setMeals]     = useState(foodLogs[today]||[]);
  const [mode, setMode]       = useState("search");
  const [query, setQuery]     = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSrch]  = useState(false);
  const [noRes, setNoRes]     = useState(false);
  const [pending, setPending] = useState(null);
  const [grams, setGrams]     = useState("");
  const [custom, setCustom]   = useState({name:"",protein:"",calories:""});
  const timer = useRef(null);

  useEffect(()=>{ setMeals(foodLogs[date]||[]); },[date,foodLogs]);

  useEffect(()=>{
    if(mode!=="search") return;
    if(!query.trim()){ setResults([]); setNoRes(false); return; }
    clearTimeout(timer.current);
    timer.current = setTimeout(async()=>{
      setSrch(true); setNoRes(false);
      try { const r=await searchFoods(query); setResults(r); setNoRes(r.length===0); }
      catch { setNoRes(true); }
      setSrch(false);
    },700);
    return ()=>clearTimeout(timer.current);
  },[query,mode]);

  async function addMeal(item) {
    const next=[...meals,{...item,id:Date.now()}];
    setMeals(next); saveFood(date,next);
  }
  function removeMeal(id) {
    const next=meals.filter(m=>m.id!==id);
    setMeals(next); saveFood(date,next);
  }
  function selectResult(f) { setPending(f); setGrams(String(Math.round(f.serving)||100)); }
  function confirmAdd() {
    const g=parseFloat(grams)||100;
    addMeal({name:`${pending.name} (${g}g)`,protein:Math.round(pending.protein100*g/100),calories:Math.round(pending.calories100*g/100)});
    setPending(null); setGrams(""); setQuery(""); setResults([]);
  }
  function addCustom() {
    if(!custom.name||!custom.protein) return;
    addMeal({name:custom.name,protein:parseFloat(custom.protein)||0,calories:parseFloat(custom.calories)||0});
    setCustom({name:"",protein:"",calories:""});
  }

  const totalP=meals.reduce((s,m)=>s+(m.protein||0),0);
  const totalC=meals.reduce((s,m)=>s+(m.calories||0),0);
  const pPct=Math.min(100,(totalP/PROTEIN_TARGET)*100);
  const cPct=Math.min(100,(totalC/CALORIE_TARGET)*100);

  return (
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>DAILY TRACKER</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.white,lineHeight:1}}>Nutrition</div>
          </div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:C.card,border:`1px solid ${C.border}`,color:C.mid,fontSize:10,borderRadius:6,padding:"5px 7px",marginBottom:4}}/>
        </div>
        <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            {label:"PROTEIN", val:Math.round(totalP), target:PROTEIN_TARGET, unit:"g",    pct:pPct, color:C.accent},
            {label:"CALORIES",val:Math.round(totalC), target:CALORIE_TARGET, unit:"kcal", pct:cPct, color:C.warn},
          ].map(({label,val,target,unit,pct,color})=>(
            <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:7}}>
                <span style={{fontFamily:"'Bebas Neue'",fontSize:28,color:pct>=100?color:C.white,lineHeight:1}}>{val}</span>
                <span style={{fontSize:9,color:C.dim}}>/ {target}{unit}</span>
              </div>
              <div style={{height:3,background:C.muted,borderRadius:2}}>
                <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:9,color:pct>=100?color:C.dim,marginTop:4}}>{pct>=100?"✓ TARGET HIT":`${target-val}${unit} to go`}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>LOGGED</div>
        {meals.length===0 && <div style={{fontSize:11,color:C.muted,paddingBottom:8}}>Nothing logged yet</div>}
        {meals.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:C.text}}>{m.name}</div>
              <div style={{fontSize:10,color:C.dim,marginTop:1}}>{m.protein}g protein · {m.calories} kcal</div>
            </div>
            <button onClick={()=>removeMeal(m.id)} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
          </div>
        ))}
      </div>

      <div style={{padding:"14px 18px"}}>
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["search","SEARCH"],["quick","QUICK ADD"],["custom","CUSTOM"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setPending(null);setQuery("");setResults([]);}}
              style={{flex:1,background:mode===m?C.accent:C.card,color:mode===m?C.bg:C.dim,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,fontSize:9,padding:"7px 3px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
              {l}
            </button>
          ))}
        </div>

        {mode==="search" && !pending && (
          <div>
            <div style={{position:"relative",marginBottom:9}}>
              <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search any food or brand…"
                style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12,padding:"11px 12px 11px 34px",outline:"none"}}/>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.dim}}>⌕</span>
              {searching && <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:14,height:14,border:`2px solid ${C.muted}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>}
            </div>
            {noRes && <div style={{fontSize:11,color:C.muted,marginBottom:8}}>No results — try different terms or use Custom</div>}
            {!query && <div style={{fontSize:10,color:C.dim}}>Type to search millions of foods</div>}
            <div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
              {results.map((f,i)=>(
                <button key={i} onClick={()=>selectResult(f)}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",textAlign:"left",cursor:"pointer"}}>
                  <div style={{fontSize:12,color:C.text,marginBottom:2}}>{f.name.length>42?f.name.slice(0,42)+"…":f.name}</div>
                  <div style={{fontSize:10,color:C.dim}}>per 100g: {Math.round(f.protein100)}g protein · {Math.round(f.calories100)} kcal</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {mode==="search" && pending && (
          <div className="fu" style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:10,padding:14}}>
            <div style={{fontSize:12,color:C.text,marginBottom:3}}>{pending.name.length>42?pending.name.slice(0,42)+"…":pending.name}</div>
            <div style={{fontSize:10,color:C.dim,marginBottom:12}}>per 100g: {Math.round(pending.protein100)}g protein · {Math.round(pending.calories100)} kcal</div>
            <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:7}}>HOW MUCH?</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {[50,75,100,150,200,250].map(g=>(
                <button key={g} onClick={()=>setGrams(String(g))}
                  style={{background:grams===String(g)?C.accent:C.surface,color:grams===String(g)?C.bg:C.dim,border:`1px solid ${grams===String(g)?C.accent:C.border}`,borderRadius:6,fontSize:11,padding:"6px 10px",cursor:"pointer",transition:"all 0.12s"}}>
                  {g}g
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
              <input type="number" value={grams} onChange={e=>setGrams(e.target.value)} placeholder="grams"
                style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:15,padding:"9px 12px",outline:"none",textAlign:"center"}}/>
              <span style={{fontSize:11,color:C.dim}}>g</span>
            </div>
            {grams && (
              <div style={{fontSize:11,color:C.mid,marginBottom:12,textAlign:"center"}}>
                = {Math.round(pending.protein100*parseFloat(grams||0)/100)}g protein · {Math.round(pending.calories100*parseFloat(grams||0)/100)} kcal
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setPending(null);setGrams("");}}
                style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontSize:11,padding:11,cursor:"pointer"}}>
                BACK
              </button>
              <button onClick={confirmAdd}
                style={{flex:2,background:C.accent,border:"none",borderRadius:8,color:C.bg,fontSize:11,fontWeight:500,padding:11,cursor:"pointer",letterSpacing:"0.08em"}}>
                ADD TO LOG
              </button>
            </div>
          </div>
        )}

        {mode==="quick" && (
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {QUICK_PRESETS.map(f=>(
              <button key={f.name} onClick={()=>addMeal({...f,id:Date.now()})}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:C.text}}>{f.name}</span>
                <span style={{fontSize:10,color:C.dim}}>{f.protein}g · {f.calories}kcal</span>
              </button>
            ))}
          </div>
        )}

        {mode==="custom" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Enter macros manually for home-cooked meals etc</div>
            {[["name","Food name","text"],["protein","Protein (g)","number"],["calories","Calories (kcal)","number"]].map(([k,ph,t])=>(
              <input key={k} type={t} value={custom[k]} onChange={e=>setCustom(p=>({...p,[k]:e.target.value}))} placeholder={ph}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12,padding:"11px 12px",outline:"none"}}/>
            ))}
            <button onClick={addCustom}
              style={{background:C.accent,color:C.bg,border:"none",borderRadius:8,padding:12,fontSize:11,fontWeight:500,letterSpacing:"0.1em",cursor:"pointer"}}>
              ADD FOOD
            </button>
          </div>
        )}
      </div>
      <div style={{height:16}}/>
    </div>
  );
}

// ── STATS TAB ─────────────────────────────────────────────────────────────────
function StatsTab({ workoutLogs, foodLogs }) {
  const [selEx, setSelEx] = useState(null);

  const allEx = (() => {
    const seen = {};
    Object.values(workoutLogs).forEach(l=>{
      Object.keys(l.data?.sets||{}).forEach(exId=>{
        if(!seen[exId]) PROGRAMME.forEach(d=>d.exercises.forEach(e=>{if(e.id===exId)seen[exId]=e.name;}));
      });
    });
    return Object.entries(seen).map(([id,name])=>({id,name}));
  })();

  const exData = selEx ? Object.values(workoutLogs).map(l=>{
    const d=l.data?.sets?.[selEx];
    if(!d?.sets) return null;
    const ws=d.sets.map(s=>parseFloat(s.w)).filter(Boolean);
    return ws.length?{date:l.date,max:Math.max(...ws)}:null;
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date)) : [];

  const last7 = Array.from({length:7}).map((_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const k=dateKey(d);
    const meals=foodLogs[k]||[];
    return {date:k,label:d.toLocaleDateString("en-GB",{weekday:"short"}),protein:meals.reduce((s,m)=>s+m.protein,0),calories:meals.reduce((s,m)=>s+m.calories,0)};
  });
  const maxBar = Math.max(...last7.map(d=>d.protein), PROTEIN_TARGET);

  return (
    <div className="fu">
      <div style={{padding:"26px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>OVERVIEW</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.white,lineHeight:1}}>Stats</div>
      </div>

      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:12}}>PROTEIN — LAST 7 DAYS</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90,position:"relative"}}>
          <div style={{position:"absolute",left:0,right:0,bottom:`${(PROTEIN_TARGET/maxBar)*86}px`,borderTop:`1px dashed ${C.accent}44`,pointerEvents:"none"}}>
            <span style={{fontSize:8,color:C.accent+"88",position:"absolute",right:0,top:-10}}>{PROTEIN_TARGET}g</span>
          </div>
          {last7.map(d=>{
            const h=maxBar>0?(d.protein/maxBar)*80:0;
            const hit=d.protein>=PROTEIN_TARGET;
            return (
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end"}}>
                {d.protein>0 && <div style={{fontSize:8,color:hit?C.accent:C.mid}}>{d.protein}g</div>}
                <div style={{width:"100%",height:Math.max(3,h),background:hit?C.accent:C.muted,borderRadius:"3px 3px 0 0",transition:"height 0.4s"}}/>
                <div style={{fontSize:8,color:C.dim}}>{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{padding:"16px 18px 0"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>SESSIONS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"Total logged", val:Object.keys(workoutLogs).length},
            {label:"Days trained",  val:new Set(Object.values(workoutLogs).map(l=>l.date)).size},
          ].map(({label,val})=>(
            <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:32,color:C.white,lineHeight:1}}>{val}</div>
              <div style={{fontSize:9,color:C.dim,marginTop:3}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 18px 24px"}}>
        <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em",marginBottom:10}}>LIFT PROGRESS</div>
        {allEx.length===0 ? (
          <div style={{fontSize:11,color:C.muted}}>Log sessions to see lift progress</div>
        ):(
          <div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
              {allEx.map(e=>(
                <button key={e.id} onClick={()=>setSelEx(selEx===e.id?null:e.id)}
                  style={{background:selEx===e.id?C.accent:C.card,color:selEx===e.id?C.bg:C.dim,border:`1px solid ${selEx===e.id?C.accent:C.border}`,borderRadius:20,fontSize:9,padding:"5px 10px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.15s"}}>
                  {e.name.length>20?e.name.slice(0,20)+"…":e.name}
                </button>
              ))}
            </div>
            {selEx && exData.length>0 && (()=>{
              const maxW=Math.max(...exData.map(d=>d.max));
              const minW=Math.min(...exData.map(d=>d.max));
              const diff=exData[exData.length-1].max-exData[0].max;
              return (
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                    <div>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:C.white,lineHeight:1}}>{exData[exData.length-1].max}kg</div>
                      <div style={{fontSize:9,color:C.dim,marginTop:2}}>latest top set</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:diff>=0?C.green:C.red,lineHeight:1}}>{diff>=0?"+":""}{diff.toFixed(1)}kg</div>
                      <div style={{fontSize:9,color:C.dim,marginTop:2}}>vs first session</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
                    {exData.map((d,i)=>{
                      const h=maxW===minW?40:8+((d.max-minW)/(maxW-minW))*52;
                      const isLast=i===exData.length-1;
                      return (
                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          {isLast && <div style={{fontSize:8,color:C.accent}}>{d.max}kg</div>}
                          <div style={{width:"100%",height:h,background:isLast?C.accent:C.muted,borderRadius:"2px 2px 0 0"}}/>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:8,color:C.dim}}>
                    <span>{fmtDate(exData[0].date)}</span>
                    <span>{fmtDate(exData[exData.length-1].date)}</span>
                  </div>
                </div>
              );
            })()}
            {selEx && exData.length===0 && <div style={{fontSize:11,color:C.muted}}>No weight data logged yet</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
